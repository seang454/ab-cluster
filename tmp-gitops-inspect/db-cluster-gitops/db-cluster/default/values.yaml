# ============================================================
# DEFAULT cluster-wide values for db-cluster chart
# These are the base values. Per-user files OVERRIDE these.
# Source: db-cluster/values.yaml from ab-cluster infra-repo
# ============================================================

ingress:
  className: nginx

operatorNamespaces:
  externalSecrets: external-secrets
  cnpg: cnpg-system
  psmdb: database-operators
  pxc: database-operators
  redis: database-operators
  k8ssandra: database-operators

externalTcpProxy:
  enabled: true
  image:
    repository: haproxy
    tag: "3.0-alpine"
  replicas: 1
  nodeSelector:
    kubernetes.io/hostname: worker03
  clusterDomain: seang.shop
  kubeClusterDomain: benzcluster
  expose:
    postgresql: false
    mysql: false
    mongodb: false
    redis: false
    cassandra: false

# All databases disabled by default — users enable what they need
postgresql:
  enabled: false

mongodb:
  enabled: false

mysql:
  enabled: false

redis:
  enabled: false

cassandra:
  enabled: false
