apiVersion: v1
data:
  haproxy.cfg: |
    global
      log stdout format raw local0

    defaults
      log global
      mode tcp
      option tcplog
      timeout connect 10s
      timeout client 1m
      timeout server 1m

    # Use Kubernetes DNS from inside the pod and allow startup before every
    # backend name resolves. This prevents CrashLoopBackOff during cluster
    # bootstrap when headless services or endpoints are not ready yet.
    resolvers kube_dns
      parse-resolv-conf
      accepted_payload_size 8192
      hold valid 10s
    # Public MySQL listener -> internal MySQL HAProxy service managed by PXC.
    frontend mysql_frontend
      bind *:13306
      default_backend mysql_backend

    backend mysql_backend
      server mysql db-seang-mysql-mysql-haproxy.ns-parryhot532-gmail-com-f5e96663.svc.benzcluster:3306 check resolvers kube_dns init-addr none
kind: ConfigMap
metadata:
