# ClusterSecretStore — tells External Secrets Operator how to connect to Vault.
# All ExternalSecret resources in every subchart reference this store by name.
# Uses Kubernetes auth with ESO service account locked down.
# Internal HTTP used (vault runs inside cluster — TLS not required for pod-to-pod).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  labels:
    app.kubernetes.io/name: vault-backend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  provider:
    vault:
      server: {{ .Values.address }}
      path: "databases"
      version: "v2"
      auth:
        tokenSecretRef:
          name: {{ .Release.Name }}-vault-root-token
          key: token
          namespace: {{ .Release.Namespace }}
