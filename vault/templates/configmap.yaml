apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vault.fullname" . }}-policies
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vault-policies
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  db-policy.hcl: |
    path "databases/data/postgresql" {
      capabilities = ["read", "list"]
    }
    path "databases/data/mongodb" {
      capabilities = ["read", "list"]
    }
    path "databases/data/mysql" {
      capabilities = ["read", "list"]
    }
    path "databases/data/redis" {
      capabilities = ["read", "list"]
    }
    path "databases/data/cassandra" {
      capabilities = ["read", "list"]
    }
    path "databases/metadata/*" {
      capabilities = ["read", "list"]
    }

  setup.sh: |
    #!/bin/sh
    set -e

    echo "==> Enabling KV secrets engine..."
    vault secrets enable -path=databases kv-v2 || echo "already enabled"

    echo "==> Writing database secrets..."
    vault kv put databases/postgresql \
      superuser-password="{{ .Values.postgresql.superuserPassword }}" \
      app-password="{{ .Values.postgresql.appPassword }}"

    vault kv put databases/mongodb \
      cluster-admin-user="{{ .Values.mongodb.clusterAdminUser }}" \
      cluster-admin-password="{{ .Values.mongodb.clusterAdminPassword }}" \
      user-admin-user="{{ .Values.mongodb.userAdminUser }}" \
      user-admin-password="{{ .Values.mongodb.userAdminPassword }}" \
      cluster-monitor-user="{{ .Values.mongodb.clusterMonitorUser }}" \
      cluster-monitor-password="{{ .Values.mongodb.clusterMonitorPassword }}" \
      database-admin-user="{{ .Values.mongodb.databaseAdminUser }}" \
      database-admin-password="{{ .Values.mongodb.databaseAdminPassword }}" \
      backup-user="{{ .Values.mongodb.backupUser }}" \
      backup-password="{{ .Values.mongodb.backupPassword }}" \
      replication-key="{{ .Values.mongodb.replicationKey }}"

    vault kv put databases/mysql \
      root-password="{{ .Values.mysql.rootPassword }}" \
      app-password="{{ .Values.mysql.appPassword }}" \
      replication-password="{{ .Values.mysql.replicationPassword }}" \
      monitor-password="{{ .Values.mysql.monitorPassword }}" \
      cluster-check-password="{{ .Values.mysql.clusterCheckPassword }}"

    vault kv put databases/redis \
      password="{{ .Values.redis.password }}"

    vault kv put databases/cassandra \
      username="{{ .Values.cassandra.username }}" \
      password="{{ .Values.cassandra.password }}"

    echo "==> Enabling Kubernetes auth..."
    vault auth enable kubernetes || echo "already enabled"

    vault write auth/kubernetes/config \
      kubernetes_host="https://kubernetes.default.svc:443" \
      token_reviewer_jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
      kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

    echo "==> Writing policy..."
    vault policy write db-policy /vault/policies/db-policy.hcl

    echo "==> Writing role (locked to ESO service account)..."
    vault write auth/kubernetes/role/db-role \
      bound_service_account_names="{{ include "vault.serviceAccountName" . }}" \
      bound_service_account_namespaces="{{ .Release.Namespace }}" \
      policies="db-policy" \
      ttl="24h"

    echo "==> Vault setup complete!"
