# =============================================================================
# vault-values.yaml — Vault HA with Raft + Transit auto-unseal
# =============================================================================
# Transit auto-unseal works like this:
#   1. vault-transit step runs FIRST → creates vault-transit-token secret
#   2. Main Vault starts → reads that secret → auto-unseals on every restart
#   3. You never need to manually unseal again after cluster restarts
# =============================================================================

injector:
  enabled: false

ui:
  enabled: true
  serviceType: ClusterIP

server:
  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: longhorn

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable     = 1
          address         = "[::]:8200"
          cluster_address = "[::]:8201"
        }

        storage "raft" {
          path = "/vault/data"
          retry_join {
            leader_api_addr = "http://vault-0.vault-internal:8200"
          }
          retry_join {
            leader_api_addr = "http://vault-1.vault-internal:8200"
          }
          retry_join {
            leader_api_addr = "http://vault-2.vault-internal:8200"
          }
        }

        # For transit seal, Vault reads the token from VAULT_TOKEN.
        # Keep the token out of the HCL config and inject it via the secret below.
        seal "transit" {
          address    = "http://vault-transit-vault-transit.vault-transit.svc:8200"
          mount_path = "transit"
          key_name   = "unseal-key"
        }

        service_registration "kubernetes" {}

        disable_mlock = true

  ingress:
    enabled: false

  # Reads vault-transit-token K8s secret → injects as VAULT_TOKEN
  # Transit seal uses VAULT_TOKEN automatically.
  extraSecretEnvironmentVars:
  - envName: VAULT_TOKEN
    secretName: vault-transit-token
    secretKey: token
    optional: false
