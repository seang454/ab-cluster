# Example overlay for exposing web UIs over HTTPS through a standard
# Kubernetes ingress controller and selected databases externally through the
# shared HAProxy TCP proxy.
#
# Cloudflare requirement:
# - Use DNS-only records for the UI hostnames below.
# - `mysql-db.seang.shop` and `mongo-db.seang.shop` also point to the same
#   external IP.

cloudflare:
  enabled: true
  zoneName: seang.shop
  externalIP: 35.194.146.154
  proxied: false
  ttl: 1
  # Prefer setting apiTokenExistingSecret instead of storing the token directly
  # in the values file.
  apiTokenExistingSecret: cloudflare-api-token

ingress:
  className: nginx

externalTcpProxy:
  enabled: true
  replicas: 1
  hostNetwork: true
  nodeSelector:
    kubernetes.io/hostname: worker01
  expose:
    postgresql: false
    mysql: true
    mongodb: true
    redis: false
    cassandra: false

longhorn:
  ingress:
    enabled: true
    host: longhorn.seang.shop
    ingressClassName: nginx
    tls:
      enabled: true
      secretName: longhorn-tls
      clusterIssuer: letsencrypt-prod

vault:
  ingress:
    enabled: true
    namespace: vault
    host: vault.seang.shop
    ingressClassName: nginx
    tls:
      enabled: true
      secretName: vault-tls
      clusterIssuer: letsencrypt-prod

postgresql:
  enabled: false
  externalAccess:
    enabled: false
    publicHostnames:
      - postgres-db.seang.shop
  tls:
    enabled: true
    mode: certManager

mysql:
  enabled: false
  externalAccess:
    enabled: false
    publicHostnames:
      - mysql-db.seang.shop
  haproxy:
    size: 2
    readinessDelaySeconds: 30
    readinessTimeoutSeconds: 10
    livenessDelaySeconds: 120
    livenessTimeoutSeconds: 10
  cluster:
    probes:
      readinessDelaySeconds: 60
      readinessTimeoutSeconds: 15
      livenessDelaySeconds: 1200
      livenessTimeoutSeconds: 15
  tls:
    enabled: true
    mode: certManager

mongodb:
  enabled: true
  externalAccess:
    enabled: true
    replicaSetHorizons:
      enabled: true
      basePort: 27017
      serviceType: ClusterIP
    publicHostnames:
      - mongo-db-0.seang.shop
      - mongo-db-1.seang.shop
      - mongo-db-2.seang.shop
  cluster:
    probes:
      livenessInitialDelaySeconds: 300
      livenessTimeoutSeconds: 30
      livenessPeriodSeconds: 30
      livenessFailureThreshold: 10
      livenessStartupDelaySeconds: 7200
      readinessInitialDelaySeconds: 60
      readinessTimeoutSeconds: 10
      readinessPeriodSeconds: 10
      readinessFailureThreshold: 30
  tls:
    enabled: true
    mode: certManager

redis:
  enabled: false
  externalAccess:
    enabled: false
    publicHostnames: []
  tls:
    enabled: true

cassandra:
  enabled: false
  externalAccess:
    enabled: false
    publicHostnames: []
  tls:
    enabled: false
    # Cassandra needs keystore/truststore material instead of PEM certs.
    # Set createSecrets=true and provide base64-encoded store content, or point
    # serverSecretName/clientSecretName at pre-created secrets.
