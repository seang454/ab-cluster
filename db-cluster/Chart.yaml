apiVersion: v2
name: db-cluster
description: >
  Database application chart for PostgreSQL, MongoDB, MySQL, Redis, and Cassandra.
  Bootstrap infrastructure is managed separately from this app release.
version: 4.0.3
appVersion: "4.0.3"
home: https://github.com/seang454/db-cluster
maintainers:
- name: seang454
keywords: [postgresql, mongodb, mysql, redis, cassandra, ha, cluster, operator]

# =============================================================================
# PRE-INSTALLED BY KUBESPRAY (no action needed):
#   ✔ Kubernetes + RBAC
#   ✔ cert-manager
#   ✔ ingress controller (this repo targets a standard Kubernetes Ingress)
# DEPLOY THIS CHART (database app release only):
#
#   helm install my-db ./db-cluster/ -n databases --create-namespace
# =============================================================================

dependencies:
  # ── Local database subcharts (CRDs — deployed after operators are ready) ────
  - name: postgresql
    version: "1.0.0"
    repository: "file://charts/postgresql"
    condition: postgresql.enabled

  - name: mongodb
    version: "1.0.0"
    repository: "file://charts/mongodb"
    condition: mongodb.enabled

  - name: mysql
    version: "1.0.0"
    repository: "file://charts/mysql"
    condition: mysql.enabled

  - name: redis
    version: "1.0.0"
    repository: "file://charts/redis"
    condition: redis.enabled

  - name: cassandra
    version: "1.0.0"
    repository: "file://charts/cassandra"
    condition: cassandra.enabled
