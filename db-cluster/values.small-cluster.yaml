# Small-cluster override for 3 worker nodes with limited schedulable CPU.
# Keeps the lighter cluster profiles enabled and disables MySQL/Cassandra.

postgresql:
  enabled: true
  operator:
    enabled: true
  cluster:
    instances: 3
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

mongodb:
  enabled: true
  operator:
    enabled: true
  cluster:
    instances: 3
    resources:
      requests:
        cpu: "200m"
        memory: "768Mi"
      limits:
        cpu: "600m"
        memory: "1536Mi"

mysql:
  enabled: false
  operator:
    enabled: false
  haproxy:
    size: 1
    readinessDelaySeconds: 15
    readinessTimeoutSeconds: 5
    livenessDelaySeconds: 60
    livenessTimeoutSeconds: 5

redis:
  enabled: true
  operator:
    enabled: true
  cluster:
    instances: 3
    resources:
      requests:
        cpu: "75m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "512Mi"

cassandra:
  enabled: false
  operator:
    enabled: false
