apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vault.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vault-auth
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "vault.serviceAccountName" . }}-binding
  labels:
    app.kubernetes.io/name: vault-auth
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
- kind: ServiceAccount
  name: {{ include "vault.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "vault.serviceAccountName" . }}-secret-reader
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vault-auth
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "vault.serviceAccountName" . }}-secret-reader
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vault-auth
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "vault.serviceAccountName" . }}-secret-reader
subjects:
- kind: ServiceAccount
  name: {{ include "vault.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
