apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisCluster
metadata:
  name: {{ include "redis.fullname" . }}
  namespace: {{ .Release.Namespace }}
{{- $tls := .Values.tls | default dict }}
{{- $connection := .Values.connection | default dict }}
{{- $auth := .Values.auth | default dict }}
{{- $externalSecretRef := .Values.externalSecretRef | default "" }}
{{- $redisPassword := get $connection "password" | default (get $auth "password" | default "") }}
{{- if not $externalSecretRef }}
{{- $redisPassword = required "redis.connection.password must be set for the client database user when redis.externalSecretRef is empty" $redisPassword }}
{{- end }}
{{- $monitoring := .Values.monitoring | default dict }}
{{- $serviceMonitor := get $monitoring "serviceMonitor" | default dict }}
spec:
  clusterSize: {{ .Values.cluster.instances }}
  clusterVersion: v7
  persistenceEnabled: true
  {{- if $tls.enabled }}
  TLS:
    ca: {{ get $tls "caKey" | default "ca.crt" }}
    cert: {{ get $tls "certKey" | default "tls.crt" }}
    key: {{ get $tls "privateKeyKey" | default "tls.key" }}
    secret:
      secretName: {{ include "redis.tlsSecretName" . }}
  {{- end }}

  redisLeader:
    readinessProbe:
      exec:
        command:
        - sh
        - -ec
        - |
          RESP="$(redis-cli -h 127.0.0.1 -p "${REDIS_PORT}" -a "${REDIS_PASSWORD}"{{- if $tls.enabled }} --tls --cert "${REDIS_TLS_CERT}" --key "${REDIS_TLS_CERT_KEY}" --cacert "${REDIS_TLS_CA_CERT}"{{- end }} ping | tail -n 1)"
          [ "$RESP" = "PONG" ]
      initialDelaySeconds: {{ .Values.cluster.probes.readinessInitialDelaySeconds }}
      timeoutSeconds: {{ .Values.cluster.probes.readinessTimeoutSeconds }}
      periodSeconds: {{ .Values.cluster.probes.readinessPeriodSeconds }}
      failureThreshold: {{ .Values.cluster.probes.readinessFailureThreshold }}
    livenessProbe:
      exec:
        command:
        - sh
        - -ec
        - |
          RESP="$(redis-cli -h 127.0.0.1 -p "${REDIS_PORT}" -a "${REDIS_PASSWORD}"{{- if $tls.enabled }} --tls --cert "${REDIS_TLS_CERT}" --key "${REDIS_TLS_CERT_KEY}" --cacert "${REDIS_TLS_CA_CERT}"{{- end }} ping | tail -n 1)"
          [ "$RESP" = "PONG" ]
      initialDelaySeconds: {{ .Values.cluster.probes.livenessInitialDelaySeconds }}
      timeoutSeconds: {{ .Values.cluster.probes.livenessTimeoutSeconds }}
      periodSeconds: {{ .Values.cluster.probes.livenessPeriodSeconds }}
      failureThreshold: {{ .Values.cluster.probes.livenessFailureThreshold }}
    {{- if or $tls.enabled $redisPassword }}
    redisConfig:
      additionalRedisConfig: {{ include "redis.additionalConfigName" . }}
    {{- end }}
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app: {{ include "redis.fullname" . }}

  redisFollower:
    readinessProbe:
      exec:
        command:
        - sh
        - -ec
        - |
          RESP="$(redis-cli -h 127.0.0.1 -p "${REDIS_PORT}" -a "${REDIS_PASSWORD}"{{- if $tls.enabled }} --tls --cert "${REDIS_TLS_CERT}" --key "${REDIS_TLS_CERT_KEY}" --cacert "${REDIS_TLS_CA_CERT}"{{- end }} ping | tail -n 1)"
          [ "$RESP" = "PONG" ]
      initialDelaySeconds: {{ .Values.cluster.probes.readinessInitialDelaySeconds }}
      timeoutSeconds: {{ .Values.cluster.probes.readinessTimeoutSeconds }}
      periodSeconds: {{ .Values.cluster.probes.readinessPeriodSeconds }}
      failureThreshold: {{ .Values.cluster.probes.readinessFailureThreshold }}
    livenessProbe:
      exec:
        command:
        - sh
        - -ec
        - |
          RESP="$(redis-cli -h 127.0.0.1 -p "${REDIS_PORT}" -a "${REDIS_PASSWORD}"{{- if $tls.enabled }} --tls --cert "${REDIS_TLS_CERT}" --key "${REDIS_TLS_CERT_KEY}" --cacert "${REDIS_TLS_CA_CERT}"{{- end }} ping | tail -n 1)"
          [ "$RESP" = "PONG" ]
      initialDelaySeconds: {{ .Values.cluster.probes.livenessInitialDelaySeconds }}
      timeoutSeconds: {{ .Values.cluster.probes.livenessTimeoutSeconds }}
      periodSeconds: {{ .Values.cluster.probes.livenessPeriodSeconds }}
      failureThreshold: {{ .Values.cluster.probes.livenessFailureThreshold }}
    {{- if or $tls.enabled $redisPassword }}
    redisConfig:
      additionalRedisConfig: {{ include "redis.additionalConfigName" . }}
    {{- end }}
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app: {{ include "redis.fullname" . }}

  kubernetesConfig:
    image: {{ .Values.cluster.image }}
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: {{ .Values.cluster.resources.requests.cpu }}
        memory: {{ .Values.cluster.resources.requests.memory }}
      limits:
        cpu: {{ .Values.cluster.resources.limits.cpu }}
        memory: {{ .Values.cluster.resources.limits.memory }}
    redisSecret:
      name: {{ include "redis.secretName" . }}
      key: password

  storage:
    nodeConfVolume: {{ .Values.storage.nodeConfVolume }}
    {{- if .Values.storage.nodeConfVolume }}
    nodeConfVolumeClaimTemplate:
      spec:
        storageClassName: {{ .Values.storage.nodeConfStorageClass | default .Values.storage.storageClass }}
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.storage.nodeConfSize }}
    {{- end }}
    volumeClaimTemplate:
      spec:
        storageClassName: {{ .Values.storage.storageClass }}
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.storage.size }}

  {{- if .Values.exporter.enabled }}
  redisExporter:
    enabled: true
    image: {{ .Values.exporter.image }}
  {{- end }}

  {{- if .Values.exporter.enabled }}
  serviceMonitor:
    enabled: true
    interval: {{ (get $serviceMonitor "interval" | default "30s") | quote }}
    scrapeTimeout: {{ (get $serviceMonitor "scrapeTimeout" | default "10s") | quote }}
    namespace: {{ (get $serviceMonitor "namespace" | default "") | quote }}
  {{- end }}
