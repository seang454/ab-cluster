{{- if not .Values.externalSecretRef }}
{{- $connection := .Values.connection | default dict -}}
{{- $redisPassword := required "redis.connection.password must be set for the client database user when redis.externalSecretRef is empty" (get $connection "password" | default .Values.auth.password) -}}
{{- $redisAclPermissions := get $connection "aclPermissions" | default (get .Values.auth "aclPermissions" | default "+@read +@write +@keyspace +@connection") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "redis.secretName" . }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  username: {{ (get $connection "username" | default (.Values.auth.username | default "default")) | quote }}
  password: {{ $redisPassword | quote }}
  acl-permissions: {{ $redisAclPermissions | quote }}
{{- end }}
