{{- $connection := .Values.connection | default dict -}}
{{- $redisPassword := required "redis.connection.password must be set for the client database user" (get $connection "password" | default .Values.auth.password) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "redis.secretName" . }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  username: {{ (get $connection "username" | default (.Values.auth.username | default "default")) | quote }}
  password: {{ $redisPassword | quote }}
