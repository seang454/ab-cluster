apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vault-transit.serviceAccountName" . }}
  namespace: {{ include "vault-transit.namespace" . }}
  labels:
    app.kubernetes.io/name: vault-transit
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vault-transit.fullname" . }}-config
  namespace: {{ include "vault-transit.namespace" . }}
  labels:
    app.kubernetes.io/name: vault-transit
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  vault.hcl: |
    ui            = false
    disable_mlock = true

    storage "file" {
      path = "/vault/data"
    }

    listener "tcp" {
      address     = "0.0.0.0:8200"
      tls_disable = true
    }

    api_addr     = "http://{{ include "vault-transit.fullname" . }}.{{ include "vault-transit.namespace" . }}.svc.cluster.local:8200"
    cluster_addr = "http://{{ include "vault-transit.fullname" . }}.{{ include "vault-transit.namespace" . }}.svc.cluster.local:8201"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "vault-transit.fullname" . }}
  namespace: {{ include "vault-transit.namespace" . }}
  labels:
    app.kubernetes.io/name: vault-transit
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ include "vault-transit.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vault-transit
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-transit
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "vault-transit.serviceAccountName" . }}
      # Init container waits for any existing vault-transit-init secret
      # before the setup-job runs — prevents race on re-deploy
      initContainers:
      - name: data-dir-init
        image: busybox:1.35
        command: ["sh", "-c", "mkdir -p /vault/data && chown -R 100:1000 /vault/data"]
        volumeMounts:
        - name: data
          mountPath: /vault/data
        securityContext:
          runAsUser: 0
      containers:
      - name: vault
        image: hashicorp/vault:1.15
        command: ["vault", "server", "-config=/vault/config/vault.hcl"]
        ports:
        - name: http
          containerPort: 8200
        - name: cluster
          containerPort: 8201
        env:
        - name: VAULT_ADDR
          value: "http://127.0.0.1:8200"
        - name: VAULT_API_ADDR
          value: "http://{{ include "vault-transit.fullname" . }}.{{ include "vault-transit.namespace" . }}.svc.cluster.local:8200"
        readinessProbe:
          httpGet:
            path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
            port: 8200
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
            port: 8200
          initialDelaySeconds: 30
          periodSeconds: 30
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        volumeMounts:
        - name: config
          mountPath: /vault/config
        - name: data
          mountPath: /vault/data
        securityContext:
          runAsNonRoot: true
          runAsUser: 100
          capabilities:
            add: ["IPC_LOCK"]
      volumes:
      - name: config
        configMap:
          name: {{ include "vault-transit.fullname" . }}-config
  volumeClaimTemplates:
  - metadata:
      name: data
      labels:
        app.kubernetes.io/name: vault-transit
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: {{ .Values.storageClass }}
      resources:
        requests:
          storage: {{ .Values.storageSize }}
