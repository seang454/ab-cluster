apiVersion: pxc.percona.com/v1
kind: PerconaXtraDBCluster
metadata:
  name: {{ include "mysql.fullname" . }}
  namespace: {{ .Release.Namespace }}
{{- $ext := .Values.externalAccess | default dict }}
{{- $conn := .Values.connectionHandling | default dict }}
spec:
  crVersion: 1.14.0

  secretsName: {{ include "mysql.secretName" . }}
  {{- if .Values.tls.enabled }}
  sslSecretName: {{ include "mysql.sslSecretName" . }}
  sslInternalSecretName: {{ include "mysql.sslInternalSecretName" . }}
  {{- end }}

  pxc:
    size: {{ .Values.cluster.instances }}
    image: {{ .Values.cluster.image }}
    sidecars:
      - name: mysqld-exporter
        image: {{ (.Values.monitoring.exporter.image | default "prom/mysqld-exporter:v0.19.0") | quote }}
        imagePullPolicy: IfNotPresent
        args:
          - --web.listen-address=:9104
          - --mysqld.address=127.0.0.1:3306
          - --mysqld.username=monitor
        ports:
          - containerPort: 9104
            name: mysql-metrics
        env:
          - name: MYSQLD_EXPORTER_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ include "mysql.secretName" . }}
                key: monitor
    {{- with .Values.cluster.probes }}
    readinessDelaySec: {{ .readinessDelaySeconds | default 60 }}
    readinessProbes:
      timeoutSeconds: {{ .readinessTimeoutSeconds | default 15 }}
    livenessDelaySec: {{ .livenessDelaySeconds | default 1200 }}
    livenessProbes:
      timeoutSeconds: {{ .livenessTimeoutSeconds | default 15 }}
    {{- end }}

    affinity:
      antiAffinityTopologyKey: kubernetes.io/hostname

    podDisruptionBudget:
      maxUnavailable: 1

    resources:
      requests:
        cpu: {{ .Values.cluster.resources.requests.cpu }}
        memory: {{ .Values.cluster.resources.requests.memory }}
      limits:
        cpu: {{ .Values.cluster.resources.limits.cpu }}
        memory: {{ .Values.cluster.resources.limits.memory }}

    volumeSpec:
      persistentVolumeClaim:
        storageClassName: {{ .Values.storage.storageClass }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}

  haproxy:
    enabled: {{ and (.Values.haproxy.enabled | default true) (ne (get $conn "enabled") false) (eq (get $conn "mode" | default "haproxy") "haproxy") }}
    {{- if $ext.enabled }}
    exposePrimary:
      enabled: true
      type: LoadBalancer
      {{- if $ext.loadBalancerClass }}
      loadBalancerClass: {{ $ext.loadBalancerClass }}
      {{- end }}
      {{- with $ext.loadBalancerSourceRanges }}
      loadBalancerSourceRanges:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $ext.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $ext.labels }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
    {{- with .Values.haproxy }}
    size: {{ .size | default 1 }}
    image: percona/percona-xtradb-cluster-operator:1.14.0-haproxy
    readinessDelaySec: {{ .readinessDelaySeconds | default 15 }}
    readinessProbes:
      timeoutSeconds: {{ .readinessTimeoutSeconds | default 5 }}
    livenessDelaySec: {{ .livenessDelaySeconds | default 60 }}
    livenessProbes:
      timeoutSeconds: {{ .livenessTimeoutSeconds | default 5 }}
    {{- else }}
    size: 1
    image: percona/percona-xtradb-cluster-operator:1.14.0-haproxy
    readinessDelaySec: 15
    readinessProbes:
      timeoutSeconds: 5
    livenessDelaySec: 60
    livenessProbes:
      timeoutSeconds: 5
    {{- end }}

  {{- if .Values.backup.enabled }}
  backup:
    image: percona/percona-xtradb-cluster-operator:1.14.0-pxc8.0-backup
    storages:
      s3-storage:
        type: s3
        s3:
          bucket: {{ tpl .Values.backup.s3.bucket . | quote }}
          region: {{ tpl .Values.backup.s3.region . | quote }}
          credentialsSecret: {{ tpl (.Values.backup.s3.credentialSecret | default (printf "minio-credentials-%s" .Release.Name)) . | quote }}
          {{- with .Values.backup.s3.endpointURL }}
          endpointUrl: {{ tpl . $ | quote }}
          {{- end }}
          {{- with .Values.backup.s3.prefix }}
          prefix: {{ tpl . $ | quote }}
          {{- end }}
    schedule:
    - name: {{ .Values.backup.schedule.name | default "daily-backup" | quote }}
      schedule: {{ .Values.backup.schedule.cron | default "0 2 * * *" | quote }}
      keep: {{ .Values.backup.schedule.keep | default 7 }}
      storageName: s3-storage
  {{- end }}
