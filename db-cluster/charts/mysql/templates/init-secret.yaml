{{- if not .Values.externalSecretRef }}
{{- $connection := .Values.connection | default dict -}}
{{- $appUsername := (get $connection "username" | default "appuser") | replace "'" "''" -}}
{{- $appPassword := (required "mysql.connection.password must be set for the client database user when mysql.externalSecretRef is empty" (get $connection "password" | default "")) | replace "'" "''" -}}
{{- $appDatabase := (required "mysql.connection.database must be set for the client database when mysql.externalSecretRef is empty" (get $connection "database" | default "")) | replace "`" "``" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mysql.initSecretName" . }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  init-users.sql: |
    CREATE DATABASE IF NOT EXISTS `{{ $appDatabase }}`;
    CREATE USER IF NOT EXISTS '{{ $appUsername }}'@'%' IDENTIFIED BY '{{ $appPassword }}';
    ALTER USER '{{ $appUsername }}'@'%' IDENTIFIED BY '{{ $appPassword }}';
    GRANT ALL PRIVILEGES ON `{{ $appDatabase }}`.* TO '{{ $appUsername }}'@'%';

    FLUSH PRIVILEGES;
{{- end }}
