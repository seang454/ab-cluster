{{- $connection := .Values.connection | default dict -}}
{{- $appUsername := (get $connection "username" | default "appuser") | replace "'" "''" -}}
{{- $appPassword := (required "mysql.connection.password must be set for the client database user" (get $connection "password" | default "")) | replace "'" "''" -}}
{{- $monitorPassword := (.Values.credentials.monitorPassword | default "") | replace "'" "''" -}}
{{- $clustercheckPassword := (.Values.credentials.clusterCheckPassword | default "") | replace "'" "''" -}}
{{- $replicationPassword := (.Values.credentials.replicationPassword | default "") | replace "'" "''" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-mysql-init
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  init-users.sql: |
    SET SESSION wsrep_on = OFF;
    SET @@SESSION.SQL_LOG_BIN = 0;

    CREATE USER IF NOT EXISTS '{{ $appUsername }}'@'%' IDENTIFIED BY '{{ $appPassword }}';
    ALTER USER '{{ $appUsername }}'@'%' IDENTIFIED BY '{{ $appPassword }}';
    GRANT ALL PRIVILEGES ON *.* TO '{{ $appUsername }}'@'%' WITH GRANT OPTION;

    CREATE USER IF NOT EXISTS 'monitor'@'%' IDENTIFIED BY '{{ $monitorPassword }}';
    GRANT PROCESS, REPLICATION CLIENT, SERVICE_CONNECTION_ADMIN ON *.* TO 'monitor'@'%';
    GRANT SELECT ON mysql.* TO 'monitor'@'%';

    CREATE USER IF NOT EXISTS 'clustercheck'@'localhost' IDENTIFIED BY '{{ $clustercheckPassword }}';
    GRANT PROCESS, SERVICE_CONNECTION_ADMIN ON *.* TO 'clustercheck'@'localhost';

    CREATE USER IF NOT EXISTS 'clustercheck'@'127.0.0.1' IDENTIFIED BY '{{ $clustercheckPassword }}';
    GRANT PROCESS, SERVICE_CONNECTION_ADMIN ON *.* TO 'clustercheck'@'127.0.0.1';

    CREATE USER IF NOT EXISTS 'clustercheck'@'%' IDENTIFIED BY '{{ $clustercheckPassword }}';
    GRANT PROCESS, SERVICE_CONNECTION_ADMIN ON *.* TO 'clustercheck'@'%';

    CREATE USER IF NOT EXISTS 'replication'@'%' IDENTIFIED BY '{{ $replicationPassword }}';
    GRANT REPLICATION SLAVE, REPLICATION CLIENT ON *.* TO 'replication'@'%';

    FLUSH PRIVILEGES;
