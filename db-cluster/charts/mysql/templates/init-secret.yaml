{{- $monitorPassword := (.Values.credentials.monitorPassword | default "") | replace "'" "''" -}}
{{- $clustercheckPassword := (.Values.credentials.clusterCheckPassword | default "") | replace "'" "''" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-mysql-init
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  init-users.sql: |
    CREATE USER IF NOT EXISTS 'monitor'@'%' IDENTIFIED BY '{{ $monitorPassword }}';
    ALTER USER 'monitor'@'%' IDENTIFIED BY '{{ $monitorPassword }}';
    GRANT PROCESS, REPLICATION CLIENT, SERVICE_CONNECTION_ADMIN ON *.* TO 'monitor'@'%';

    CREATE USER IF NOT EXISTS 'clustercheck'@'localhost' IDENTIFIED BY '{{ $clustercheckPassword }}';
    ALTER USER 'clustercheck'@'localhost' IDENTIFIED BY '{{ $clustercheckPassword }}';
    GRANT PROCESS, SERVICE_CONNECTION_ADMIN ON *.* TO 'clustercheck'@'localhost';

    CREATE USER IF NOT EXISTS 'clustercheck'@'127.0.0.1' IDENTIFIED BY '{{ $clustercheckPassword }}';
    ALTER USER 'clustercheck'@'127.0.0.1' IDENTIFIED BY '{{ $clustercheckPassword }}';
    GRANT PROCESS, SERVICE_CONNECTION_ADMIN ON *.* TO 'clustercheck'@'127.0.0.1';

    CREATE USER IF NOT EXISTS 'clustercheck'@'%' IDENTIFIED BY '{{ $clustercheckPassword }}';
    ALTER USER 'clustercheck'@'%' IDENTIFIED BY '{{ $clustercheckPassword }}';
    GRANT PROCESS, SERVICE_CONNECTION_ADMIN ON *.* TO 'clustercheck'@'%';

    FLUSH PRIVILEGES;
