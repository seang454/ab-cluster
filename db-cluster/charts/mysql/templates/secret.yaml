# ExternalSecret — ESO syncs from Vault into a standard Kubernetes Secret.
# The Percona PXC operator reads it like any normal Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "mysql.secretName" . }}
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "mysql.secretName" . }}
    creationPolicy: Owner
    template:
      type: Opaque
  data:
  - secretKey: root
    remoteRef:
      key: databases/mysql
      property: root-password
  - secretKey: xtrabackup
    remoteRef:
      key: databases/mysql
      property: replication-password
  - secretKey: monitor
    remoteRef:
      key: databases/mysql
      property: monitor-password
  - secretKey: clustercheck
    remoteRef:
      key: databases/mysql
      property: cluster-check-password
  - secretKey: proxyadmin
    remoteRef:
      key: databases/mysql
      property: root-password
  - secretKey: operator
    remoteRef:
      key: databases/mysql
      property: root-password
  - secretKey: replication
    remoteRef:
      key: databases/mysql
      property: replication-password
