apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "mysql.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mysql
    app.kubernetes.io/instance: {{ include "mysql.fullname" . }}
    {{- with (.Values.monitoring.podMonitor.labels) }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ include "mysql.fullname" . }}
      app.kubernetes.io/component: pxc
  podMetricsEndpoints:
    - port: mysql-metrics
      path: /metrics
      interval: {{ (.Values.monitoring.podMonitor.interval | default "30s") | quote }}
      scrapeTimeout: {{ (.Values.monitoring.podMonitor.scrapeTimeout | default "10s") | quote }}
