{{- $ext := .Values.externalAccess | default dict -}}
{{- $horizons := get $ext "replicaSetHorizons" | default dict -}}
{{- $publicHosts := $ext.publicHostnames | default list -}}
{{- $instances := int .Values.cluster.instances -}}
{{- $basePort := int ($horizons.basePort | default 27017) -}}
{{- $horizonsEnabled := and ($ext.enabled | default false) ($horizons.enabled | default false) (eq (len $publicHosts) $instances) -}}
apiVersion: psmdb.percona.com/v1
kind: PerconaServerMongoDB
metadata:
  name: {{ include "mongodb.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  crVersion: {{ .Values.cluster.crVersion | quote }}
  image: {{ .Values.cluster.image }}
  {{- if .Values.tls.enabled }}
  tls:
    mode: requireTLS
    allowInvalidCertificates: false
  {{- end }}

  secrets:
    users: {{ include "mongodb.secretName" . }}
    {{- if .Values.tls.enabled }}
    ssl: {{ include "mongodb.sslSecretName" . }}
    sslInternal: {{ include "mongodb.sslInternalSecretName" . }}
    {{- end }}

  replsets:
  - name: rs0
    size: {{ $instances }}
    {{- with .Values.cluster.env }}
    env:
      {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.cluster.configuration }}
    configuration: |
      {{- . | nindent 6 }}
    {{- end }}
    {{- with .Values.cluster.sidecars }}
    sidecars:
      {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if $horizonsEnabled }}
    expose:
      enabled: true
      type: {{ $horizons.serviceType | default "ClusterIP" }}
    splitHorizons:
      {{- range $i, $_ := until $instances }}
      {{ include "mongodb.fullname" $ }}-rs0-{{ $i }}:
        external: {{ index $publicHosts $i | quote }}
      {{- end }}
    {{- end }}
    {{- with .Values.cluster.probes }}
    livenessProbe:
      initialDelaySeconds: {{ .livenessInitialDelaySeconds | default 300 }}
      timeoutSeconds: {{ .livenessTimeoutSeconds | default 30 }}
      periodSeconds: {{ .livenessPeriodSeconds | default 30 }}
      failureThreshold: {{ .livenessFailureThreshold | default 10 }}
      startupDelaySeconds: {{ .livenessStartupDelaySeconds | default 7200 }}
    readinessProbe:
      initialDelaySeconds: {{ .readinessInitialDelaySeconds | default 60 }}
      timeoutSeconds: {{ .readinessTimeoutSeconds | default 10 }}
      periodSeconds: {{ .readinessPeriodSeconds | default 10 }}
      failureThreshold: {{ .readinessFailureThreshold | default 30 }}
    {{- end }}

    affinity:
      antiAffinityTopologyKey: kubernetes.io/hostname

    podDisruptionBudget:
      maxUnavailable: 1

    resources:
      requests:
        cpu: {{ .Values.cluster.resources.requests.cpu }}
        memory: {{ .Values.cluster.resources.requests.memory }}
      limits:
        cpu: {{ .Values.cluster.resources.limits.cpu }}
        memory: {{ .Values.cluster.resources.limits.memory }}

    volumeSpec:
      persistentVolumeClaim:
        storageClassName: {{ .Values.storage.storageClass }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}

  {{- if .Values.backup.enabled }}
  backup:
    enabled: true
    image: percona/percona-backup-mongodb:2.3.0
    storages:
      s3-storage:
        type: s3
        s3:
          bucket: {{ .Values.backup.s3.bucket }}
          region: {{ .Values.backup.s3.region }}
          credentialsSecret: {{ .Values.backup.s3.credentialSecret }}
    tasks:
    - name: daily-backup
      enabled: true
      schedule: "0 2 * * *"
      storageName: s3-storage
      compressionType: gzip
  {{- end }}
