{{- $ext := .Values.externalAccess | default dict -}}
{{- $horizons := get $ext "replicaSetHorizons" | default dict -}}
{{- $publicHosts := $ext.publicHostnames | default list -}}
{{- $instances := int .Values.cluster.instances -}}
{{- $basePort := int ($horizons.basePort | default 27017) -}}
{{- $horizonsEnabled := and ($ext.enabled | default false) ($horizons.enabled | default false) (eq (len $publicHosts) $instances) -}}
{{- $mongodbBackupSecretName := .Values.backup.s3.credentialSecret | default (printf "minio-credentials-%s" .Release.Name) -}}
{{- $proxy := .Values.externalTcpProxy | default dict -}}
{{- $kubeClusterDomain := get $proxy "kubeClusterDomain" | default "" -}}
{{- $clusterServiceDNSSuffix := .Values.clusterServiceDNSSuffix | default $kubeClusterDomain -}}
apiVersion: psmdb.percona.com/v1
kind: PerconaServerMongoDB
metadata:
  name: {{ include "mongodb.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  crVersion: {{ .Values.cluster.crVersion | quote }}
  image: {{ .Values.cluster.image }}
  {{- with .Values.unsafeFlags }}
  unsafeFlags:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if $clusterServiceDNSSuffix }}
  clusterServiceDNSMode: {{ .Values.clusterServiceDNSMode | default "Internal" | quote }}
  clusterServiceDNSSuffix: {{ printf "svc.%s" $clusterServiceDNSSuffix | quote }}
  {{- end }}
  {{- if .Values.tls.enabled }}
  tls:
    mode: requireTLS
    allowInvalidCertificates: false
  {{- end }}

  secrets:
    users: {{ include "mongodb.secretName" . }}
    {{- if .Values.tls.enabled }}
    ssl: {{ include "mongodb.sslSecretName" . }}
    sslInternal: {{ include "mongodb.sslInternalSecretName" . }}
    {{- end }}

  replsets:
  - name: rs0
    size: {{ $instances }}
    labels:
      monitoring.seang.shop/mongodb-exporter: "true"
    {{- with .Values.cluster.env }}
    env:
      {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.cluster.configuration }}
    configuration: |
      {{- . | nindent 6 }}
    {{- end }}
    {{- if .Values.cluster.sidecars }}
    sidecars:
      {{- with .Values.cluster.sidecars }}
      {{- toYaml . | nindent 4 }}
      {{- end }}
    - name: mongodb-exporter
      image: {{ (.Values.monitoring.exporter.image | default "percona/mongodb_exporter:0.40") | quote }}
      imagePullPolicy: IfNotPresent
      args:
        - --web.listen-address=:9216
        - --compatible-mode
        - --mongodb.uri=mongodb://$(MONGODB_CLUSTER_MONITOR_USER):$(MONGODB_CLUSTER_MONITOR_PASSWORD)@127.0.0.1:27017/admin
      ports:
        - containerPort: 9216
          name: mongodb-metrics
      env:
        - name: MONGODB_CLUSTER_MONITOR_USER
          valueFrom:
            secretKeyRef:
              name: {{ include "mongodb.secretName" . }}
              key: MONGODB_CLUSTER_MONITOR_USER
        - name: MONGODB_CLUSTER_MONITOR_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "mongodb.secretName" . }}
              key: MONGODB_CLUSTER_MONITOR_PASSWORD
    {{- end }}
    {{- if $horizonsEnabled }}
    expose:
      enabled: true
      type: {{ $horizons.serviceType | default "ClusterIP" }}
    splitHorizons:
      {{- range $i, $_ := until $instances }}
      {{ include "mongodb.fullname" $ }}-rs0-{{ $i }}:
        external: {{ index $publicHosts $i | quote }}
      {{- end }}
    {{- end }}
    {{- with .Values.cluster.probes }}
    livenessProbe:
      initialDelaySeconds: {{ .livenessInitialDelaySeconds | default 300 }}
      timeoutSeconds: {{ .livenessTimeoutSeconds | default 30 }}
      periodSeconds: {{ .livenessPeriodSeconds | default 30 }}
      failureThreshold: {{ .livenessFailureThreshold | default 10 }}
      startupDelaySeconds: {{ .livenessStartupDelaySeconds | default 7200 }}
    readinessProbe:
      initialDelaySeconds: {{ .readinessInitialDelaySeconds | default 60 }}
      timeoutSeconds: {{ .readinessTimeoutSeconds | default 10 }}
      periodSeconds: {{ .readinessPeriodSeconds | default 10 }}
      failureThreshold: {{ .readinessFailureThreshold | default 30 }}
    {{- end }}

    affinity:
      antiAffinityTopologyKey: kubernetes.io/hostname

    podDisruptionBudget:
      maxUnavailable: 1

    resources:
      requests:
        cpu: {{ .Values.cluster.resources.requests.cpu }}
        memory: {{ .Values.cluster.resources.requests.memory }}
      limits:
        cpu: {{ .Values.cluster.resources.limits.cpu }}
        memory: {{ .Values.cluster.resources.limits.memory }}

    volumeSpec:
      persistentVolumeClaim:
        storageClassName: {{ .Values.storage.storageClass }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}

  {{- if .Values.backup.enabled }}
  {{- $storageType := .Values.backup.storageType | default "minio" }}
  backup:
    enabled: true
    image: percona/percona-backup-mongodb:2.3.0
    storages:
      s3-storage:
        type: {{ $storageType }}
        {{ $storageType }}:
          bucket: {{ tpl .Values.backup.s3.bucket . | quote }}
          region: {{ tpl .Values.backup.s3.region . | quote }}
          credentialsSecret: {{ tpl $mongodbBackupSecretName . | quote }}
          {{- with .Values.backup.s3.endpointURL }}
          endpointUrl: {{ tpl . $ | quote }}
          {{- end }}
          {{- with .Values.backup.s3.prefix }}
          prefix: {{ tpl . $ | quote }}
          {{- end }}
    tasks:
    - name: {{ .Values.backup.task.name | default "daily-backup" | quote }}
      enabled: true
      schedule: {{ .Values.backup.task.schedule | default "0 2 * * *" | quote }}
      storageName: s3-storage
      compressionType: {{ .Values.backup.task.compressionType | default "gzip" | quote }}
  {{- end }}
