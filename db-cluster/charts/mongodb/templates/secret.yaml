{{- $clusterAdminPassword := required "mongodb.credentials.clusterAdminPassword must be set" .Values.credentials.clusterAdminPassword -}}
{{- $userAdminPassword := required "mongodb.credentials.userAdminPassword must be set" .Values.credentials.userAdminPassword -}}
{{- $clusterMonitorPassword := required "mongodb.credentials.clusterMonitorPassword must be set" .Values.credentials.clusterMonitorPassword -}}
{{- $databaseAdminPassword := required "mongodb.credentials.databaseAdminPassword must be set" .Values.credentials.databaseAdminPassword -}}
{{- $backupPassword := required "mongodb.credentials.backupPassword must be set" .Values.credentials.backupPassword -}}
{{- $replicationKey := required "mongodb.credentials.replicationKey must be set" .Values.credentials.replicationKey -}}
{{- $secretName := include "mongodb.secretName" . -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- range $name, $value := dict "clusterAdminPassword" $clusterAdminPassword "userAdminPassword" $userAdminPassword "clusterMonitorPassword" $clusterMonitorPassword "databaseAdminPassword" $databaseAdminPassword "backupPassword" $backupPassword "replicationKey" $replicationKey }}
{{- if eq $value "secret" }}
{{- fail (printf "mongodb.credentials.%s must not use the placeholder value 'secret'" $name) }}
{{- end }}
{{- end }}
{{- if not $existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  MONGODB_CLUSTER_ADMIN_USER: {{ .Values.credentials.clusterAdminUser | quote }}
  MONGODB_CLUSTER_ADMIN_PASSWORD: {{ $clusterAdminPassword | quote }}
  MONGODB_USER_ADMIN_USER: {{ .Values.credentials.userAdminUser | quote }}
  MONGODB_USER_ADMIN_PASSWORD: {{ $userAdminPassword | quote }}
  MONGODB_CLUSTER_MONITOR_USER: {{ .Values.credentials.clusterMonitorUser | quote }}
  MONGODB_CLUSTER_MONITOR_PASSWORD: {{ $clusterMonitorPassword | quote }}
  MONGODB_DATABASE_ADMIN_USER: {{ .Values.credentials.databaseAdminUser | quote }}
  MONGODB_DATABASE_ADMIN_PASSWORD: {{ $databaseAdminPassword | quote }}
  MONGODB_BACKUP_USER: {{ .Values.credentials.backupUser | quote }}
  MONGODB_BACKUP_PASSWORD: {{ $backupPassword | quote }}
  MONGODB_REPLICATION_KEY: {{ $replicationKey | quote }}
{{- end }}
