# ExternalSecret — ESO syncs from Vault into a standard Kubernetes Secret.
# The Percona PSMDB operator reads it like any normal Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "mongodb.secretName" . }}
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "mongodb.secretName" . }}
    creationPolicy: Owner
    template:
      type: Opaque
  data:
  - secretKey: MONGODB_CLUSTER_ADMIN_USER
    remoteRef:
      key: databases/mongodb
      property: cluster-admin-user
  - secretKey: MONGODB_CLUSTER_ADMIN_PASSWORD
    remoteRef:
      key: databases/mongodb
      property: cluster-admin-password
  - secretKey: MONGODB_USER_ADMIN_USER
    remoteRef:
      key: databases/mongodb
      property: user-admin-user
  - secretKey: MONGODB_USER_ADMIN_PASSWORD
    remoteRef:
      key: databases/mongodb
      property: user-admin-password
  - secretKey: MONGODB_CLUSTER_MONITOR_USER
    remoteRef:
      key: databases/mongodb
      property: cluster-monitor-user
  - secretKey: MONGODB_CLUSTER_MONITOR_PASSWORD
    remoteRef:
      key: databases/mongodb
      property: cluster-monitor-password
  - secretKey: MONGODB_DATABASE_ADMIN_USER
    remoteRef:
      key: databases/mongodb
      property: database-admin-user
  - secretKey: MONGODB_DATABASE_ADMIN_PASSWORD
    remoteRef:
      key: databases/mongodb
      property: database-admin-password
  - secretKey: MONGODB_BACKUP_USER
    remoteRef:
      key: databases/mongodb
      property: backup-user
  - secretKey: MONGODB_BACKUP_PASSWORD
    remoteRef:
      key: databases/mongodb
      property: backup-password
  - secretKey: MONGODB_REPLICATION_KEY
    remoteRef:
      key: databases/mongodb
      property: replication-key
