{{- $tls := .Values.tls | default dict -}}
{{- $cm := $tls.certManager | default dict -}}
{{- $generateCA := get $cm "generateCA" | default true -}}
{{- $ext := .Values.externalAccess | default dict -}}
{{- $instances := int (.Values.cluster.instances | default 3) -}}
{{- $clusterServiceDNSSuffix := .Values.clusterServiceDNSSuffix | default "" -}}
{{- if and $tls.enabled ($tls.renderCertificates | default false) (eq ($tls.mode | default "certManager") "certManager") }}
{{- if $generateCA }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "mongodb.fullname" . }}-selfsigned
  namespace: {{ .Release.Namespace }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "mongodb.caCertificateSecretName" . }}
  namespace: {{ .Release.Namespace }}
spec:
  isCA: true
  commonName: {{ include "mongodb.fullname" . }}-ca
  secretName: {{ include "mongodb.caCertificateSecretName" . }}
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: {{ include "mongodb.fullname" . }}-selfsigned
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "mongodb.caIssuerName" . }}
  namespace: {{ .Release.Namespace }}
spec:
  ca:
    secretName: {{ include "mongodb.caCertificateSecretName" . }}
---
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "mongodb.sslSecretName" . }}
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ include "mongodb.sslSecretName" . }}
  commonName: {{ include "mongodb.fullname" . }}-rs0
  subject:
    organizations:
    - MongoDB
    organizationalUnits:
    - MongoDB Server
  privateKey:
    algorithm: RSA
    size: 2048
  dnsNames:
  - {{ include "mongodb.fullname" . }}-rs0
  - {{ include "mongodb.fullname" . }}-rs0.{{ .Release.Namespace }}
  - {{ include "mongodb.fullname" . }}-rs0.{{ .Release.Namespace }}.svc
  {{- if $clusterServiceDNSSuffix }}
  - {{ include "mongodb.fullname" . }}-rs0.{{ .Release.Namespace }}.svc.{{ $clusterServiceDNSSuffix }}
  {{- end }}
  {{- range $i, $_ := until $instances }}
  - {{ include "mongodb.fullname" $ }}-rs0-{{ $i }}
  - {{ include "mongodb.fullname" $ }}-rs0-{{ $i }}.{{ include "mongodb.fullname" $ }}-rs0
  - {{ include "mongodb.fullname" $ }}-rs0-{{ $i }}.{{ include "mongodb.fullname" $ }}-rs0.{{ $.Release.Namespace }}
  - {{ include "mongodb.fullname" $ }}-rs0-{{ $i }}.{{ include "mongodb.fullname" $ }}-rs0.{{ $.Release.Namespace }}.svc
  {{- if $clusterServiceDNSSuffix }}
  - {{ include "mongodb.fullname" $ }}-rs0-{{ $i }}.{{ include "mongodb.fullname" $ }}-rs0.{{ $.Release.Namespace }}.svc.{{ $clusterServiceDNSSuffix }}
  {{- end }}
  - {{ include "mongodb.fullname" $ }}-rs0-{{ $i }}.{{ $.Release.Namespace }}
  - {{ include "mongodb.fullname" $ }}-rs0-{{ $i }}.{{ $.Release.Namespace }}.svc
  {{- if $clusterServiceDNSSuffix }}
  - {{ include "mongodb.fullname" $ }}-rs0-{{ $i }}.{{ $.Release.Namespace }}.svc.{{ $clusterServiceDNSSuffix }}
  {{- end }}
  {{- end }}
  {{- range ($ext.publicHostnames | default list) }}
  - {{ . }}
  {{- end }}
  issuerRef:
    {{- if $generateCA }}
    name: {{ include "mongodb.caIssuerName" . }}
    kind: Issuer
    group: cert-manager.io
    {{- else }}
    name: {{ get ($cm.issuer | default dict) "name" }}
    kind: {{ get ($cm.issuer | default dict) "kind" | default "ClusterIssuer" }}
    group: {{ get ($cm.issuer | default dict) "group" | default "cert-manager.io" }}
    {{- end }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "mongodb.sslInternalSecretName" . }}
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ include "mongodb.sslInternalSecretName" . }}
  commonName: {{ include "mongodb.fullname" . }}-internal
  subject:
    organizations:
    - MongoDB
    organizationalUnits:
    - MongoDB Server
  privateKey:
    algorithm: RSA
    size: 2048
  dnsNames:
  - "*.{{ include "mongodb.fullname" . }}-rs0"
  - "*.{{ include "mongodb.fullname" . }}-rs0.{{ .Release.Namespace }}"
  - "*.{{ include "mongodb.fullname" . }}-rs0.{{ .Release.Namespace }}.svc"
  {{- if $clusterServiceDNSSuffix }}
  - "*.{{ include "mongodb.fullname" . }}-rs0.{{ .Release.Namespace }}.svc.{{ $clusterServiceDNSSuffix }}"
  {{- end }}
  issuerRef:
    {{- if $generateCA }}
    name: {{ include "mongodb.caIssuerName" . }}
    kind: Issuer
    group: cert-manager.io
    {{- else }}
    name: {{ get ($cm.issuer | default dict) "name" }}
    kind: {{ get ($cm.issuer | default dict) "kind" | default "ClusterIssuer" }}
    group: {{ get ($cm.issuer | default dict) "group" | default "cert-manager.io" }}
    {{- end }}
{{- end }}
