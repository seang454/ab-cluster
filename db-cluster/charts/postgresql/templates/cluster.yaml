apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "postgresql.fullname" . }}
  namespace: {{ .Release.Namespace }}
{{- $ext := .Values.externalAccess | default dict }}
{{- $connection := .Values.connection | default dict }}
{{- $externalIPs := list -}}
{{- $postgresBackupSecretName := .Values.backup.s3Credentials.accessKeyId.secretName | default (printf "minio-credentials-%s" .Release.Name) -}}
{{- if $ext.externalIP }}
{{- $externalIPs = concat $externalIPs (list $ext.externalIP) -}}
{{- end }}
{{- with $ext.externalIPs }}
{{- $externalIPs = concat $externalIPs . -}}
{{- end }}
spec:
  instances: {{ .Values.cluster.instances }}
  imageName: {{ .Values.cluster.imageName }}
  enableSuperuserAccess: {{ .Values.cluster.enableSuperuserAccess | default false }}
  {{- if and .Values.tls.enabled (ne (.Values.tls.mode | default "certManager") "operator") }}
  certificates:
    serverTLSSecret: {{ include "postgresql.serverTLSSecretName" . }}
    serverCASecret: {{ include "postgresql.serverCASecretName" . }}
  {{- end }}
  superuserSecret:
    name: {{ include "postgresql.superuserSecretName" . }}

  postgresql:
    parameters:
      max_connections: {{ .Values.cluster.postgresql.max_connections | quote }}
      shared_buffers: {{ .Values.cluster.postgresql.shared_buffers | quote }}
      effective_cache_size: {{ .Values.cluster.postgresql.effective_cache_size | quote }}
      maintenance_work_mem: {{ .Values.cluster.postgresql.maintenance_work_mem | quote }}
      checkpoint_completion_target: {{ .Values.cluster.postgresql.checkpoint_completion_target | quote }}
      wal_buffers: {{ .Values.cluster.postgresql.wal_buffers | quote }}
      default_statistics_target: {{ .Values.cluster.postgresql.default_statistics_target | quote }}
      random_page_cost: {{ .Values.cluster.postgresql.random_page_cost | quote }}
      effective_io_concurrency: {{ .Values.cluster.postgresql.effective_io_concurrency | quote }}
      work_mem: {{ .Values.cluster.postgresql.work_mem | quote }}
      wal_level: {{ .Values.cluster.postgresql.wal_level | quote }}
      log_connections: {{ .Values.cluster.postgresql.log_connections | quote }}
      log_disconnections: {{ .Values.cluster.postgresql.log_disconnections | quote }}
      log_duration: {{ .Values.cluster.postgresql.log_duration | quote }}
      log_min_duration_statement: {{ .Values.cluster.postgresql.log_min_duration_statement | quote }}

  bootstrap:
    initdb:
      database: {{ .Values.cluster.bootstrap.database }}
      owner: {{ (get $connection "username" | default .Values.cluster.bootstrap.owner) | quote }}
      secret:
        name: {{ include "postgresql.appSecretName" . }}
      encoding: {{ .Values.cluster.bootstrap.encoding }}
      localeCType: C
      localeCollate: C

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: {{ .Values.cluster.whenUnsatisfiable }}
      labelSelector:
        matchLabels:
          cnpg.io/cluster: {{ include "postgresql.fullname" . }}

  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: {{ .Values.cluster.podAntiAffinityType }}

  storage:
    storageClass: {{ include "postgresql.storageClass" . }}
    size: {{ .Values.storage.size }}

  {{- if .Values.storage.wal.enabled }}
  walStorage:
    storageClass: {{ include "postgresql.storageClass" . }}
    size: {{ .Values.storage.wal.size }}
  {{- end }}

  resources:
    requests:
      cpu: {{ .Values.cluster.resources.requests.cpu }}
      memory: {{ .Values.cluster.resources.requests.memory }}
    limits:
      cpu: {{ .Values.cluster.resources.limits.cpu | quote }}
      memory: {{ .Values.cluster.resources.limits.memory }}

  monitoring:
    enablePodMonitor: {{ .Values.cluster.monitoring.enablePodMonitor }}

  switchoverDelay: {{ .Values.cluster.switchoverDelay }}
  failoverDelay: {{ .Values.cluster.failoverDelay }}

  {{- if .Values.backup.enabled }}
  backup:
    barmanObjectStore:
      destinationPath: {{ tpl .Values.backup.destinationPath . | quote }}
      {{- with .Values.backup.endpointURL }}
      endpointURL: {{ . | quote }}
      {{- end }}
      {{- with .Values.backup.endpointCA.secretName }}
      endpointCA:
        name: {{ . }}
        key: {{ $.Values.backup.endpointCA.secretKey | quote }}
      {{- end }}
      {{- if eq (.Values.backup.provider | default "s3") "gcs" }}
      googleCredentials:
        applicationCredentials:
          name: {{ tpl (.Values.backup.credentialSecret | default "gcs-credentials") . | quote }}
          key: credentials.json
      {{- else }}
      s3Credentials:
        accessKeyId:
          name: {{ tpl $postgresBackupSecretName . | quote }}
          key: {{ .Values.backup.s3Credentials.accessKeyId.key | quote }}
        secretAccessKey:
          name: {{ tpl (.Values.backup.s3Credentials.secretAccessKey.secretName | default $postgresBackupSecretName) . | quote }}
          key: {{ .Values.backup.s3Credentials.secretAccessKey.key | quote }}
        {{- with .Values.backup.s3Credentials.region.secretName }}
        region:
          name: {{ tpl . $ | quote }}
          key: {{ $.Values.backup.s3Credentials.region.key | quote }}
        {{- end }}
      {{- end }}
      wal:
        compression: gzip
    retentionPolicy: {{ .Values.backup.retentionPolicy | quote }}
  {{- end }}
