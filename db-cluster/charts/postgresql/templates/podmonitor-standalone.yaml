{{- $clusterPM := .Values.cluster.monitoring.standalonePodMonitor | default dict -}}
{{- if and ($clusterPM.enabled | default false) (not .Values.cluster.monitoring.enablePodMonitor) }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "postgresql.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
    cnpg.io/cluster: {{ include "postgresql.fullname" . }}
    {{- with $clusterPM.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: {{ include "postgresql.fullname" . }}
      cnpg.io/podRole: instance
  podMetricsEndpoints:
  - port: metrics
    interval: {{ $clusterPM.interval | default "30s" }}
    scrapeTimeout: {{ $clusterPM.scrapeTimeout | default "10s" }}
---
{{- end }}
{{- $poolerPM := .Values.pooler.monitoring.standalonePodMonitor | default dict -}}
{{- if and .Values.pooler.enabled ($poolerPM.enabled | default false) (not .Values.pooler.monitoring.enablePodMonitor) }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "postgresql.poolerName" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
    cnpg.io/cluster: {{ include "postgresql.fullname" . }}
    cnpg.io/poolerName: {{ include "postgresql.poolerName" . }}
    {{- with $poolerPM.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: {{ include "postgresql.fullname" . }}
      cnpg.io/podRole: pooler
      cnpg.io/poolerName: {{ include "postgresql.poolerName" . }}
  podMetricsEndpoints:
  - port: metrics
    interval: {{ $poolerPM.interval | default "30s" }}
    scrapeTimeout: {{ $poolerPM.scrapeTimeout | default "10s" }}
{{- end }}
