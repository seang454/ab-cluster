# ExternalSecret — External Secrets Operator syncs this from Vault into a
# standard Kubernetes Secret. The CNPG operator reads it like any normal Secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "postgresql.secretName" . }}
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "postgresql.secretName" . }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: "postgres"
        password: "{{ `{{ .superuserPassword }}` }}"
  data:
  - secretKey: superuserPassword
    remoteRef:
      key: databases/postgresql
      property: superuser-password
  - secretKey: appPassword
    remoteRef:
      key: databases/postgresql
      property: app-password
