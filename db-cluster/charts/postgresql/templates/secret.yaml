{{- $connection := .Values.connection | default dict -}}
{{- $renderSuperuserSecret := not .Values.superuserExternalSecretRef -}}
{{- $renderAppSecret := not .Values.externalSecretRef -}}
{{- if $renderSuperuserSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgresql.superuserSecretName" . }}
  namespace: {{ .Release.Namespace }}
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: {{ .Values.credentials.superuser | quote }}
{{- end }}
{{- if $renderAppSecret }}
{{- $appUsername := get $connection "username" | default .Values.cluster.bootstrap.owner -}}
{{- $appPassword := required "postgresql.connection.password must be set for the client database user when postgresql.externalSecretRef is empty" (get $connection "password" | default .Values.credentials.admin) -}}
{{- if $renderSuperuserSecret }}
---
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgresql.appSecretName" . }}
  namespace: {{ .Release.Namespace }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ $appUsername | quote }}
  password: {{ $appPassword | quote }}
{{- end }}
