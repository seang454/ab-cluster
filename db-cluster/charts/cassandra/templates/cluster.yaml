apiVersion: k8ssandra.io/v1alpha1
kind: K8ssandraCluster
metadata:
  name: {{ include "cassandra.fullname" . }}
  namespace: {{ .Release.Namespace }}
{{- $tls := .Values.tls | default dict }}
{{- $monitoring := .Values.monitoring | default dict }}
{{- $prometheus := get $monitoring "prometheus" | default dict }}
{{- $clusterConfig := .Values.cluster.config | default dict }}
{{- $jvmOptions := get $clusterConfig "jvmOptions" | default dict }}
{{- $targetInstances := int (default 1 .Values.cluster.instances) }}
{{- $bootstrapInstances := ternary 1 $targetInstances (gt $targetInstances 1) }}
spec:
  cassandra:
    serverVersion: "4.1.3"
    serverImage: {{ .Values.cluster.image }}
    clusterName: {{ include "cassandra.clusterName" . }}
    configBuilderResources:
      requests:
        cpu: {{ .Values.cluster.configBuilderResources.requests.cpu }}
        memory: {{ .Values.cluster.configBuilderResources.requests.memory }}
      limits:
        cpu: {{ .Values.cluster.configBuilderResources.limits.cpu }}
        memory: {{ .Values.cluster.configBuilderResources.limits.memory }}
    systemLoggerResources:
      requests:
        cpu: {{ .Values.cluster.systemLoggerResources.requests.cpu }}
        memory: {{ .Values.cluster.systemLoggerResources.requests.memory }}
      limits:
        cpu: {{ .Values.cluster.systemLoggerResources.limits.cpu }}
        memory: {{ .Values.cluster.systemLoggerResources.limits.memory }}
    {{- if and (get $monitoring "enabled") (get $prometheus "enabled") }}
    telemetry:
      prometheus:
        enabled: true
        {{- with (get $prometheus "commonLabels") }}
        commonLabels:
          {{- toYaml . | nindent 10 }}
        {{- end }}
    {{- end }}
    {{- if or $tls.enabled (gt (len $jvmOptions) 0) }}
    config:
      {{- if gt (len $jvmOptions) 0 }}
      jvmOptions:
        {{- with (get $jvmOptions "heap_initial_size") }}
        heap_initial_size: {{ . | quote }}
        {{- end }}
        {{- with (get $jvmOptions "heap_max_size") }}
        heap_max_size: {{ . | quote }}
        {{- end }}
      {{- end }}
      {{- if $tls.enabled }}
      cassandraYaml:
        server_encryption_options:
          internode_encryption: {{ get $tls "internodeEncryption" | default "all" | quote }}
          require_client_auth: {{ dig "requireClientAuth" true $tls }}
        client_encryption_options:
          enabled: {{ dig "clientEncryption" true $tls }}
          require_client_auth: {{ dig "requireClientAuth" true $tls }}
      {{- end }}
    serverEncryptionStores:
      keystoreSecretRef:
        name: {{ include "cassandra.serverSecretName" . }}
      truststoreSecretRef:
        name: {{ include "cassandra.serverSecretName" . }}
    clientEncryptionStores:
      keystoreSecretRef:
        name: {{ include "cassandra.clientSecretName" . }}
      truststoreSecretRef:
        name: {{ include "cassandra.clientSecretName" . }}
    {{- end }}

    superuserSecretRef:
      name: {{ include "cassandra.secretName" . }}

    datacenters:
    - metadata:
        name: {{ include "cassandra.datacenter" . }}
      size: {{ $bootstrapInstances }}
      containers:
      - name: cassandra
        livenessProbe:
          httpGet:
            path: /api/v0/probes/liveness
            port: 8080
            scheme: HTTP
          initialDelaySeconds: {{ .Values.cluster.probes.livenessInitialDelaySeconds }}
          periodSeconds: {{ .Values.cluster.probes.livenessPeriodSeconds }}
          timeoutSeconds: {{ .Values.cluster.probes.livenessTimeoutSeconds }}
          failureThreshold: {{ .Values.cluster.probes.livenessFailureThreshold }}
        readinessProbe:
          httpGet:
            path: /api/v0/probes/readiness
            port: 8080
            scheme: HTTP
          initialDelaySeconds: {{ .Values.cluster.probes.readinessInitialDelaySeconds }}
          periodSeconds: {{ .Values.cluster.probes.readinessPeriodSeconds }}
          timeoutSeconds: {{ .Values.cluster.probes.readinessTimeoutSeconds }}
          failureThreshold: {{ .Values.cluster.probes.readinessFailureThreshold }}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: {{ include "cassandra.fullname" . }}

      resources:
        requests:
          cpu: {{ .Values.cluster.resources.requests.cpu }}
          memory: {{ .Values.cluster.resources.requests.memory }}
        limits:
          cpu: {{ .Values.cluster.resources.limits.cpu }}
          memory: {{ .Values.cluster.resources.limits.memory }}

      storageConfig:
        cassandraDataVolumeClaimSpec:
          storageClassName: {{ .Values.storage.storageClass }}
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: {{ .Values.storage.size }}

  {{- if .Values.backup.enabled }}
  medusa:
    containerImage:
      registry: docker.io
      repository: k8ssandra
      name: medusa
      tag: {{ .Values.backup.medusaImage | splitList ":" | last }}
    {{- if and $tls.enabled (dig "clientEncryption" true $tls) }}
    certificatesSecretRef:
      name: {{ include "cassandra.clientSecretName" . }}
    {{- end }}
    storageProperties:
      storageProvider: {{ tpl (.Values.backup.s3.provider | default "s3_compatible") . | quote }}
      bucketName: {{ tpl .Values.backup.s3.bucket . | quote }}
      region: {{ tpl .Values.backup.s3.region . | quote }}
      storageSecretRef:
        name: {{ tpl (.Values.backup.s3.credentialSecret | default (printf "minio-credentials-%s" .Release.Name)) . | quote }}
      prefix: {{ tpl .Values.backup.s3.prefix . | quote }}
      {{- if eq (.Values.backup.s3.provider | default "s3_compatible") "s3_compatible" }}
      host: {{ tpl .Values.backup.s3.host . | quote }}
      port: {{ .Values.backup.s3.port }}
      secure: {{ .Values.backup.s3.secure }}
      {{- end }}
  {{- end }}
