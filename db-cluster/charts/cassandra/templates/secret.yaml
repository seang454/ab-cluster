# ExternalSecret — ESO syncs from Vault into a standard Kubernetes Secret.
# The K8ssandra operator reads it like any normal Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "cassandra.secretName" . }}
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "cassandra.secretName" . }}
    creationPolicy: Owner
    template:
      type: Opaque
  data:
  - secretKey: username
    remoteRef:
      key: databases/cassandra
      property: username
  - secretKey: password
    remoteRef:
      key: databases/cassandra
      property: password
