{{- if not .Values.externalSecretRef }}
{{- $connection := .Values.connection | default dict -}}
{{- $cassandraPassword := required "cassandra.connection.password must be set for the client database user when cassandra.externalSecretRef is empty" (get $connection "password" | default .Values.credentials.password) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cassandra.secretName" . }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  username: {{ (get $connection "username" | default .Values.credentials.username) | quote }}
  password: {{ $cassandraPassword | quote }}
{{- end }}
