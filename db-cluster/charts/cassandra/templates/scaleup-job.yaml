{{- $targetInstances := int (default 1 .Values.cluster.instances) }}
{{- $sequentialScaleupConfig := get (.Values.cluster | default dict) "sequentialScaleup" | default dict }}
{{- $sequentialScaleup := get $sequentialScaleupConfig "enabled" | default false }}
{{- if and $sequentialScaleup (gt $targetInstances 1) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cassandra.fullname" . }}-scaleup
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    spec:
      serviceAccountName: {{ include "cassandra.fullname" . }}-scaleup
      restartPolicy: OnFailure
      containers:
        - name: scaleup
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              ns="{{ .Release.Namespace }}"
              target="{{ $targetInstances }}"
              parent="{{ include "cassandra.fullname" . }}"
              dc="{{ include "cassandra.datacenter" . }}"
              internal="{{ include "cassandra.clusterName" . }}"
              pod="${internal}-${dc}-default-sts-0"

              echo "Waiting for Cassandra seed pod ${pod} to be created..."
              until kubectl get "pod/${pod}" -n "${ns}" >/dev/null 2>&1; do
                sleep 10
              done

              echo "Waiting for Cassandra seed pod ${pod} to become Ready before scaling to ${target}..."
              kubectl wait --for=condition=Ready "pod/${pod}" -n "${ns}" --timeout=45m

              current=1
              while [ "${current}" -lt "${target}" ]; do
                next=$((current + 1))

                echo "Patching K8ssandraCluster ${parent} to size ${next}"
                kubectl patch k8ssandracluster "${parent}" -n "${ns}" --type json \
                  -p="[{\"op\":\"replace\",\"path\":\"/spec/cassandra/datacenters/0/size\",\"value\":${next}}]"

                echo "Patching CassandraDatacenter ${dc} to size ${next}"
                kubectl patch cassandradatacenter "${dc}" -n "${ns}" --type json \
                  -p="[{\"op\":\"replace\",\"path\":\"/spec/size\",\"value\":${next}}]"

                next_pod="${internal}-${dc}-default-sts-$((next - 1))"
                echo "Waiting for pod ${next_pod} to be created..."
                until kubectl get "pod/${next_pod}" -n "${ns}" >/dev/null 2>&1; do
                  sleep 10
                done

                echo "Waiting for pod ${next_pod} to become Ready..."
                kubectl wait --for=condition=Ready "pod/${next_pod}" -n "${ns}" --timeout=45m

                echo "Waiting for StatefulSet ${internal}-${dc}-default-sts to settle at ${next} replicas"
                kubectl rollout status "statefulset/${internal}-${dc}-default-sts" -n "${ns}" --timeout=45m

                current="${next}"
              done
{{- end }}
