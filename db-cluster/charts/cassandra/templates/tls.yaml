{{- if and .Values.tls.enabled .Values.tls.createSecrets }}
{{- $ext := .Values.externalAccess | default dict -}}
{{- $publicHosts := $ext.publicHostnames | default list -}}
{{- $publicHost := "cassandra-db.seang.shop" -}}
{{- if gt (len $publicHosts) 0 -}}
{{- $publicHost = index $publicHosts 0 -}}
{{- end -}}
{{- $serviceName := printf "%s-%s-service" .Values.cluster.config.clusterName .Values.cluster.config.datacenter -}}
{{- $dnsSans := list (printf "dns:%s" $publicHost) (printf "dns:%s" $serviceName) (printf "dns:%s.%s" $serviceName .Release.Namespace) (printf "dns:%s.%s.svc" $serviceName .Release.Namespace) -}}
{{- range $host := $publicHosts -}}
{{- $dnsSans = append $dnsSans (printf "dns:%s" $host) -}}
{{- end -}}
{{- $serverSecretName := include "cassandra.serverSecretName" . -}}
{{- $clientSecretName := include "cassandra.clientSecretName" . -}}
{{- $caConfigName := printf "%s-client-ca" (include "cassandra.fullname" .) -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cassandra.fullname" . }}-tls-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cassandra.fullname" . }}-tls-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps"]
  verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cassandra.fullname" . }}-tls-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cassandra.fullname" . }}-tls-bootstrap
subjects:
- kind: ServiceAccount
  name: {{ include "cassandra.fullname" . }}-tls-bootstrap
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cassandra.fullname" . }}-tls-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "cassandra.fullname" . }}-tls-bootstrap
      volumes:
      - name: work
        emptyDir: {}
      initContainers:
      - name: generate-jks
        image: eclipse-temurin:17-jdk
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -ec
        - |
          set -eu
          host="${CASSANDRA_PUBLIC_HOST:-cassandra-db.seang.shop}"
          san_list="${CASSANDRA_SAN_LIST}"
          server_pass="${SERVER_KEYSTORE_PASSWORD}"
          server_trust_pass="${SERVER_TRUSTSTORE_PASSWORD}"
          client_pass="${CLIENT_KEYSTORE_PASSWORD}"
          client_trust_pass="${CLIENT_TRUSTSTORE_PASSWORD}"

          keytool -genkeypair \
            -keyalg RSA \
            -alias cassandra \
            -keystore /work/server-keystore.jks \
            -storepass "$server_pass" \
            -keypass "$server_pass" \
            -validity 3650 \
            -dname "CN=${host}" \
            -ext "SAN=${san_list}" \
            -noprompt

          keytool -export \
            -alias cassandra \
            -file /work/cassandra.cer \
            -keystore /work/server-keystore.jks \
            -storepass "$server_pass" \
            -rfc \
            -noprompt

          keytool -import \
            -v -trustcacerts \
            -alias cassandra \
            -file /work/cassandra.cer \
            -keystore /work/client-truststore.jks \
            -storepass "$client_trust_pass" \
            -noprompt

          cp /work/server-keystore.jks /work/client-keystore.jks
          cp /work/client-truststore.jks /work/server-truststore.jks
        env:
        - name: CASSANDRA_PUBLIC_HOST
          value: {{ $publicHost | quote }}
        - name: CASSANDRA_SAN_LIST
          value: {{ join "," $dnsSans | quote }}
        - name: SERVER_KEYSTORE_PASSWORD
          value: {{ .Values.tls.serverSecret.keystorePassword | quote }}
        - name: SERVER_TRUSTSTORE_PASSWORD
          value: {{ .Values.tls.serverSecret.truststorePassword | quote }}
        - name: CLIENT_KEYSTORE_PASSWORD
          value: {{ .Values.tls.clientSecret.keystorePassword | quote }}
        - name: CLIENT_TRUSTSTORE_PASSWORD
          value: {{ .Values.tls.clientSecret.truststorePassword | quote }}
        volumeMounts:
        - name: work
          mountPath: /work
      containers:
      - name: create-secrets
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -ec
        - |
          set -eu

          if kubectl get secret {{ $serverSecretName | quote }} >/dev/null 2>&1 \
            && kubectl get secret {{ $clientSecretName | quote }} >/dev/null 2>&1 \
            && kubectl get configmap {{ $caConfigName | quote }} >/dev/null 2>&1; then
            echo "Cassandra TLS secrets already exist; skipping bootstrap"
            exit 0
          fi

          kubectl create secret generic {{ $serverSecretName | quote }} \
            --from-file=keystore=/work/server-keystore.jks \
            --from-file=truststore=/work/server-truststore.jks \
            --from-literal=keystore-password="{{ .Values.tls.serverSecret.keystorePassword }}" \
            --from-literal=truststore-password="{{ .Values.tls.serverSecret.truststorePassword }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic {{ $clientSecretName | quote }} \
            --from-file=keystore=/work/client-keystore.jks \
            --from-file=truststore=/work/client-truststore.jks \
            --from-literal=keystore-password="{{ .Values.tls.clientSecret.keystorePassword }}" \
            --from-literal=truststore-password="{{ .Values.tls.clientSecret.truststorePassword }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create configmap {{ $caConfigName | quote }} \
            --from-file=cassandra.cer=/work/cassandra.cer \
            --dry-run=client -o yaml | kubectl apply -f -
        volumeMounts:
        - name: work
          mountPath: /work
{{- end }}
