{{- $targetInstances := int (default 1 .Values.cluster.instances) }}
{{- $sequentialScaleupConfig := get (.Values.cluster | default dict) "sequentialScaleup" | default dict }}
{{- $sequentialScaleup := get $sequentialScaleupConfig "enabled" | default false }}
{{- if and $sequentialScaleup (gt $targetInstances 1) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cassandra.fullname" . }}-scaleup
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cassandra.fullname" . }}-scaleup
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["k8ssandra.io"]
    resources: ["k8ssandraclusters"]
    verbs: ["get", "patch"]
  - apiGroups: ["cassandra.datastax.com"]
    resources: ["cassandradatacenters"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cassandra.fullname" . }}-scaleup
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ include "cassandra.fullname" . }}-scaleup
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cassandra.fullname" . }}-scaleup
{{- end }}
