# =============================================================================
# db-cluster v4 — Operator-based Umbrella Chart Values
# Hybrid secret approach: Vault (source of truth) + ESO (syncs to K8s Secrets)
# =============================================================================

# =============================================================================
# CERT-MANAGER ClusterIssuer
# =============================================================================
certManager:
  enabled: true
  email: pengseangsim210@gmail.com
  clusterIssuer:
    name: letsencrypt-prod
    server: https://acme-v02.api.letsencrypt.org/directory
    ingressClass: nginx

# =============================================================================
# GENERIC INGRESS
# =============================================================================
ingress:
  className: nginx

# =============================================================================
# EXTERNAL TCP PROXY (HAProxy)
# Shared TCP entrypoint for database traffic without using a cloud LoadBalancer.
# Runs separately from the database operators and forwards to internal services.
# =============================================================================
externalTcpProxy:
  enabled: false
  image:
    repository: haproxy
    tag: "3.0-alpine"
    pullPolicy: IfNotPresent
  replicas: 1
  # Bind HAProxy directly to the node network so the node's public IP can
  # accept raw database TCP traffic such as 5432.
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  # Pin the proxy to the node that already receives the public IP traffic.
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources: {}
  service:
    enabled: false
    type: ClusterIP
  expose:
    # Enable only the database ports you actually want HAProxy to publish.
    postgresql: true
    mysql: true
    mongodb: true
    redis: true
    cassandra: true
  ports:
    postgresql: 5432
    mysql: 3306
    mongodb: 27017
    redis: 6379
    cassandra: 9042
  timeouts:
    connect: 10s
    client: 1m
    server: 1m

# =============================================================================
# LONGHORN UI Ingress
# =============================================================================
longhorn:
  enabled: true
  namespace: longhorn-system
  ingress:
    enabled: true
    host: longhorn.seang.shop
    ingressClassName: nginx
    annotations: {}
    tls:
      enabled: true
      secretName: longhorn-tls
      clusterIssuer: "letsencrypt-prod"

# =============================================================================
# EXTERNAL SECRETS OPERATOR
# Syncs secrets from Vault into Kubernetes Secrets automatically.
# Operators consume plain K8s Secrets — no code changes needed.
# =============================================================================
externalSecrets:
  enabled: true
  installCRDs: true

# =============================================================================
# CLOUDFLARE DNS AUTOMATION
# Creates/updates DNS-only A records for database hostnames that point at the
# external IP already routing traffic to your ingress controller.
# =============================================================================
cloudflare:
  enabled: false
  zoneName: ""
  externalIP: ""
  proxied: false
  ttl: 1
  apiToken: ""
  apiTokenExistingSecret: ""
  apiTokenSecretKey: token

# =============================================================================
# VAULT TRANSIT — single-node Vault, auto-unseals the main Vault HA cluster
# No cloud KMS required — completely self-contained inside your cluster
# Deploys to its own namespace: vault-transit
# =============================================================================
vaultTransit:
  enabled: true
  namespace: vault-transit
  storageClass: longhorn
  storageSize: 2Gi

# =============================================================================
# VAULT — Source of truth for all secrets
# =============================================================================
#
# Transit unseal is enabled by default — no cloud KMS required.
# vault-transit subchart runs first and creates the vault-transit-token secret
# automatically. Main Vault reads it via secretKeyRef.
#
# DO NOT put real passwords here — pass via --set at deploy time:
#
#   export PG_PASS="YourRealPass"
#   export MONGO_PASS="YourRealPass"
#   export MYSQL_PASS="YourRealPass"
#   export REDIS_PASS="YourRealPass"
#   export CASS_PASS="YourRealPass"
#
#   helm install my-db ./db-cluster/ -n databases --create-namespace \
#     --set "vault.postgresql.superuserPassword=$PG_PASS" \
#     --set "vault.postgresql.appPassword=$PG_PASS" \
#     --set "vault.mongodb.clusterAdminPassword=$MONGO_PASS" \
#     --set "vault.mongodb.userAdminPassword=$MONGO_PASS" \
#     --set "vault.mongodb.clusterMonitorPassword=$MONGO_PASS" \
#     --set "vault.mongodb.databaseAdminPassword=$MONGO_PASS" \
#     --set "vault.mongodb.backupPassword=$MONGO_PASS" \
#     --set "vault.mongodb.replicationKey=$MONGO_PASS" \
#     --set "vault.mysql.rootPassword=$MYSQL_PASS" \
#     --set "vault.mysql.appPassword=$MYSQL_PASS" \
#     --set "vault.mysql.replicationPassword=$MYSQL_PASS" \
#     --set "vault.mysql.monitorPassword=$MYSQL_PASS" \
#     --set "vault.mysql.clusterCheckPassword=$MYSQL_PASS" \
#     --set "vault.redis.password=$REDIS_PASS" \
#     --set "vault.cassandra.password=$CASS_PASS"
# =============================================================================
vault:
  enabled: true
  # HTTP for internal cluster communication (transit vault is also HTTP)
  address: "http://vault.vault.svc.cluster.local:8200"
  role: "db-role"
  ingress:
    enabled: true
    namespace: vault
    host: vault.seang.shop
    ingressClassName: nginx
    annotations: {}
    tls:
      enabled: true
      secretName: vault-tls
      clusterIssuer: "letsencrypt-prod"

  autoUnseal:
    awskms:
      enabled: false
      region: "ap-southeast-1"
      kmsKeyId: "YOUR_KMS_KEY_ID"
    gcpckms:
      enabled: false
      project: "your-gcp-project"
      region: "global"
      keyRing: "vault-keyring"
      cryptoKey: "vault-key"
      credentials: "/vault/userconfig/gcp-credentials/credentials.json"
    azurekeyvault:
      enabled: false
      tenantId: "your-tenant-id"
      vaultName: "your-keyvault-name"
      keyName: "vault-unseal-key"
    transit:
      enabled: true
      address: "http://vault-transit.vault-transit.svc.cluster.local:8200"
      tokenSecretName: "vault-transit-token"
      tokenSecretKey: "token"
      mountPath: "transit"
      key: "unseal-key"

  # All passwords EMPTY — pass via --set from env vars at deploy time (see above)
  postgresql:
    superuserPassword: ""
    appPassword: ""
  mongodb:
    clusterAdminUser: "clusterAdmin"
    clusterAdminPassword: ""
    userAdminUser: "userAdmin"
    userAdminPassword: ""
    clusterMonitorUser: "clusterMonitor"
    clusterMonitorPassword: ""
    databaseAdminUser: "databaseAdmin"
    databaseAdminPassword: ""
    backupUser: "backup"
    backupPassword: ""
    replicationKey: ""
  mysql:
    rootPassword: ""
    appPassword: ""
    replicationPassword: ""
    monitorPassword: ""
    clusterCheckPassword: ""
  redis:
    password: ""
  cassandra:
    password: ""

# =============================================================================
# POSTGRESQL — CloudNativePG Operator
# =============================================================================
postgresql:
  enabled: false
  operator:
    enabled: false
  externalAccess:
    enabled: false
    # If serviceType is not set and externalIP/externalIPs are provided, the
    # chart uses ClusterIP + externalIPs. Otherwise it defaults to LoadBalancer.
    serviceType: ""
    serviceName: ""
    # Convenience for a single externally routed IP already owned by your
    # machine/network path.
    externalIP: ""
    # Optional list form if you have more than one externally routed IP.
    externalIPs: []
    loadBalancerClass: ""
    loadBalancerSourceRanges: []
    annotations: {}
    labels: {}
    updateStrategy: patch
    # Add public DNS names here so cert-manager includes them in the database
    # server certificate SANs. Example: postgres-db.example.com
    publicHostnames: []
  tls:
    enabled: true
    mode: operator
    existingSecretName: ""
    existingCASecretName: ""
    certManager:
      generateCA: true
      issuer:
        name: ""
        kind: ClusterIssuer
        group: cert-manager.io

  cluster:
    instances: 3
    imageName: ghcr.io/cloudnative-pg/postgresql:16.2

    postgresql:
      max_connections: "100"
      shared_buffers: "256MB"
      effective_cache_size: "512MB"
      maintenance_work_mem: "64MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "4MB"
      wal_level: "logical"
      log_connections: "off"
      log_disconnections: "off"
      log_duration: "off"
      log_min_duration_statement: "1000"

    bootstrap:
      database: appdb
      owner: appuser
      encoding: UTF8

    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1500m"
        memory: "2Gi"

    podAntiAffinityType: preferred
    whenUnsatisfiable: DoNotSchedule
    switchoverDelay: 60
    failoverDelay: 0
    monitoring:
      enabled: false

  storage:
    size: 10Gi
    storageClass: longhorn
    wal:
      enabled: true
      size: 2Gi

  backup:
    enabled: false
    destinationPath: "s3://your-bucket/postgresql"
    credentialSecret: "gcs-credentials"
    retentionPolicy: "7d"

# =============================================================================
# MONGODB — Percona Operator for MongoDB
# =============================================================================
mongodb:
  enabled: false
  operator:
    enabled: false
  externalAccess:
    enabled: false
    # For external replica set clients, publish one public hostname and map
    # each MongoDB member to a stable external port on its own public hostname.
    # When replicaSetHorizons.enabled=true, provide one hostname per member in
    # publicHostnames, matching cluster.instances.
    replicaSetHorizons:
      enabled: false
      basePort: 27017
      serviceType: ClusterIP
    publicHostnames: []
  tls:
    enabled: true
    mode: certManager
    sslSecretName: ""
    sslInternalSecretName: ""
    certManager:
      generateCA: true
      issuer:
        name: ""
        kind: ClusterIssuer
        group: cert-manager.io

  cluster:
    crVersion: "1.22.0"
    instances: 3
    image: percona/percona-server-mongodb:7.0.30-16
    configuration: |
      net:
        tls:
          allowConnectionsWithoutCertificates: true
    env:
      - name: PATH
        value: /opt/percona:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    sidecars:
      - name: mongo-compat
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -c
          - |
            cat >/opt/percona/mongo <<'EOW'
            #!/bin/sh
            exec /usr/bin/mongosh "$@"
            EOW
            chmod +x /opt/percona/mongo
            sleep infinity
        volumeMounts:
          - name: bin
            mountPath: /opt/percona
    probes:
      # MongoDB replica set bootstrap and user creation can take several
      # minutes on Longhorn. The operator defaults are too aggressive and can
      # push the pods into a restart loop before initialization settles.
      livenessInitialDelaySeconds: 300
      livenessTimeoutSeconds: 30
      livenessPeriodSeconds: 30
      livenessFailureThreshold: 10
      livenessStartupDelaySeconds: 7200
      readinessInitialDelaySeconds: 60
      readinessTimeoutSeconds: 10
      readinessPeriodSeconds: 10
      readinessFailureThreshold: 30
    resources:
      requests:
        cpu: "250m"
        memory: "1Gi"
      limits:
        cpu: "1500m"
        memory: "3Gi"

  storage:
    size: 10Gi
    storageClass: longhorn

  backup:
    enabled: false
    s3:
      bucket: your-bucket
      region: us-east-1
      credentialSecret: "aws-s3-secret"

# =============================================================================
# MYSQL — Percona Operator for MySQL (PXC)
# =============================================================================
mysql:
  enabled: false
  operator:
    enabled: false
  externalAccess:
    enabled: false
    loadBalancerClass: ""
    loadBalancerSourceRanges: []
    annotations: {}
    labels: {}
    # Add public DNS names here so cert-manager includes them in the database
    # server certificate SANs. Example: mysql-db.example.com
    publicHostnames: []
  tls:
    enabled: true
    mode: certManager
    sslSecretName: ""
    sslInternalSecretName: ""
    certManager:
      generateCA: true
      issuer:
        name: ""
        kind: ClusterIssuer
        group: cert-manager.io

  haproxy:
    # The Percona operator enforces at least two HAProxy replicas as a safe
    # default. Match that here to avoid endless reconciliation churn.
    size: 2
    readinessDelaySeconds: 15
    readinessTimeoutSeconds: 5
    livenessDelaySeconds: 60
    livenessTimeoutSeconds: 5

  cluster:
    instances: 3
    image: percona/percona-xtradb-cluster:8.0
    probes:
      # Longhorn-backed initial bootstrap can take several minutes. Give the
      # first PXC node enough time to finish initializing before kubelet
      # liveness checks kill it and force a full restart.
      readinessDelaySeconds: 60
      readinessTimeoutSeconds: 15
      livenessDelaySeconds: 1200
      livenessTimeoutSeconds: 15
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "1500m"
        memory: "2Gi"

  storage:
    size: 10Gi
    storageClass: longhorn

  backup:
    enabled: false
    s3:
      bucket: your-bucket
      region: us-east-1
      credentialSecret: "aws-s3-secret"

# =============================================================================
# REDIS — OpsTree Redis Operator
# =============================================================================
redis:
  enabled: false
  operator:
    enabled: false
  externalAccess:
    enabled: false
    publicHostnames: []
  tls:
    enabled: true
    secretName: ""
    caKey: ca.crt
    certKey: tls.crt
    privateKeyKey: tls.key
    certManager:
      generateCA: true
      issuer:
        name: ""
        kind: ClusterIssuer
        group: cert-manager.io

  cluster:
    instances: 3
    image: redis:7.2-alpine
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

  storage:
    size: 5Gi
    storageClass: longhorn

  exporter:
    enabled: false
    image: quay.io/opstree/redis-exporter:v1.44.0

# =============================================================================
# CASSANDRA — K8ssandra Operator
# =============================================================================
cassandra:
  enabled: false
  operator:
    enabled: false
  externalAccess:
    enabled: false
    publicHostnames: []
  tls:
    enabled: false
    clientEncryption: true
    requireClientAuth: false
    internodeEncryption: all
    createSecrets: false
    serverSecretName: ""
    clientSecretName: ""
    serverSecret:
      keystore: ""
      keystorePassword: ""
      truststore: ""
      truststorePassword: ""
    clientSecret:
      keystore: ""
      keystorePassword: ""
      truststore: ""
      truststorePassword: ""

  cluster:
    instances: 3
    image: k8ssandra/cass-management-api:4.1.3
    config:
      clusterName: seang-cassandra
      datacenter: dc1
    resources:
      requests:
        cpu: "400m"
        memory: "1536Mi"
      limits:
        cpu: "1"
        memory: "3Gi"
    configBuilderResources:
      requests:
        cpu: "250m"
        memory: "192Mi"
      limits:
        cpu: "500m"
        memory: "384Mi"
    systemLoggerResources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        memory: "128Mi"

  storage:
    size: 10Gi
    storageClass: longhorn

  backup:
    enabled: false
    medusaImage: k8ssandra/medusa:0.14.0
    s3:
      bucket: your-bucket
      region: us-east-1
      credentialSecret: "aws-s3-secret"
