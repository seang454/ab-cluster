# =============================================================================
# db-cluster v4 — Operator-based Umbrella Chart Values
# Cluster-wide knobs for the database app chart. Bootstrap layers live in setup.sh.
# =============================================================================

# This file tunes cluster-wide behavior: ingress, DNS, database exposure,
# and each database subchart's defaults.

global:
  # Optional identity key for one logical database cluster. When set, all
  # database backup paths use this folder inside the namespace bucket.
  clusterIdentity: ""

# =============================================================================
# GENERIC INGRESS
# =============================================================================
ingress:
  # Default ingress class for HTTP services.
  className: nginx

# =============================================================================
# SHARED OPERATOR NAMESPACES
# Operator controllers can be installed once and reused by database clusters
# deployed in many application namespaces.
# =============================================================================
operatorNamespaces:
  externalSecrets: external-secrets
  cnpg: cnpg-system
  psmdb: database-operators
  pxc: database-operators
  redis: database-operators
  k8ssandra: database-operators

# =============================================================================
# EXTERNAL TCP PROXY (HAProxy)
# Shared TCP entrypoint for database traffic without using a cloud LoadBalancer.
# Runs separately from the database operators and forwards to internal services.
# =============================================================================
externalTcpProxy:
  # Shared TCP entrypoint for all database ports exposed outside the cluster.
  enabled: false
  image:
    # HAProxy is the single L4 hop that forwards public DB traffic to cluster services.
    repository: haproxy
    tag: "3.0-alpine"
    pullPolicy: IfNotPresent
  replicas: 1
  # Recreate avoids hostPort collisions when the single pinned proxy pod is replaced.
  strategy: Recreate
  # Bind HAProxy directly to the node network so the node's public IP can
  # accept raw database TCP traffic such as 5432.
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  # Pin the public TCP proxy to the node your external DNS points to.
  # Update this hostname if your public database records target a different node.
  nodeSelector:
    kubernetes.io/hostname: node1
  tolerations: []
  affinity: {}
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
  service:
    enabled: false
    type: ClusterIP
  # Public DNS zone used by your external database hostnames.
  clusterDomain: seang.shop
  # Kubernetes service DNS suffix used for internal HAProxy backends.
  # This cluster uses the `benzcluster` DNS suffix for internal service names.
  kubeClusterDomain: benzcluster
  expose:
    # Enable only the database ports you actually want HAProxy to publish.
    postgresql: true
    mysql: true
    mongodb: true
    redis: true
    cassandra: true
  ports:
    # Default external ports are shifted into a high, user-friendly range so
    # many clusters can coexist without fighting over the same node port.
    # Recommended user override ranges:
    # postgresql: 15432-15999
    # mysql:      13306-13999
    # mongodb:    17017-17999
    # redis:      16379-16999
    # cassandra:  19042-19999
    postgresql: 15432
    mysql: 13306
    mongodb: 17017
    redis: 16379
    cassandra: 19042
  postgresql:
    # Leave empty to derive the backend dynamically as:
    # <release>-postgresql-rw
    backendServiceName: ""
  timeouts:
    connect: 10s
    client: 1m
    server: 1m

# =============================================================================
# POSTGRESQL — CloudNativePG Operator
# =============================================================================
postgresql:
  # Enable PostgreSQL for the seang release so the external TCP proxy renders
  # the PostgreSQL listener/backend on every deploy.
  enabled: false
  # Optional existing Secret for the bootstrap app user. When set, Helm will
  # not create the release-scoped app Secret from values. The Secret must
  # expose `username` and `password` keys.
  externalSecretRef: ""
  # Optional existing Secret for the PostgreSQL superuser. When set, Helm will
  # not create the release-scoped superuser Secret from values. The Secret must
  # expose `username` and `password` keys, and `username` should be `postgres`.
  superuserExternalSecretRef: ""
  # Connection handling for PostgreSQL is operator-native PgBouncer via the
  # CloudNativePG Pooler resource.
  connectionHandling:
    enabled: true
    mode: pooler
  operator:
    enabled: false
  connection:
    username: app_postgres
    password: ""
    port: 15432
  credentials:
    # Internal/operator credentials can stay at chart defaults. The application
    # user should be supplied through postgresql.connection.
    superuser: "PostgresInternalChangeMe123!"
    admin: ""
    standby: ""
  externalAccess:
    # Enable external PostgreSQL access by default through the shared external
    # HAProxy; keep the operator-facing service type internal.
    enabled: true
    serviceType: ClusterIP
    serviceName: ""
    externalIP: ""
    externalIPs: []
    loadBalancerClass: ""
    loadBalancerSourceRanges: []
    annotations: {}
    labels: {}
    updateStrategy: patch
    publicHostnames:
      - postgres-db.seang.shop
  tls:
    # Normal TLS for external clients; keep false only if you want mTLS.
    enabled: true
    mode: operator
    existingSecretName: ""
    existingCASecretName: ""
    certManager:
      generateCA: true
      issuer:
        name: ""
        kind: ClusterIssuer
        group: cert-manager.io

  cluster:
    instances: 3
    imageName: ghcr.io/cloudnative-pg/postgresql:16.2
    enableSuperuserAccess: true

    postgresql:
      max_connections: "100"
      shared_buffers: "256MB"
      effective_cache_size: "512MB"
      maintenance_work_mem: "64MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "4MB"
      wal_level: "replica"
      log_connections: "off"
      log_disconnections: "off"
      log_duration: "off"
      log_min_duration_statement: "1000"

    bootstrap:
      database: appdb
      # Kept for backward compatibility. postgresql.connection.username is used
      # for new request-driven deployments.
      owner: app_postgres
      encoding: UTF8

    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

    podAntiAffinityType: preferred
    # Prefer spreading PostgreSQL instances across nodes, but do not block
    # clone/deploy completion on small clusters when one node is short on CPU.
    whenUnsatisfiable: ScheduleAnyway
    switchoverDelay: 60
    failoverDelay: 0
    monitoring:
      # Keep CNPG PodMonitor generation disabled by default. In this cluster
      # the operator can fail cluster bootstrap while creating auxiliary
      # monitoring objects. Use a standalone PodMonitor if you want scraping.
      enablePodMonitor: false
      standalonePodMonitor:
        enabled: true
        interval: 30s
        scrapeTimeout: 10s
        labels:
          release: prometheus-stack-release

  storage:
    # Persistent volume size for each PostgreSQL instance.
    size: 4Gi
    storageClass: longhorn
    # WAL gets its own volume so write-ahead logs do not contend with main data.
    wal:
      enabled: true
      size: 2Gi

  backup:
    # Default backup target is the MinIO release installed by setup.sh.
    # Uses one bucket per Helm release, with a PostgreSQL-specific prefix.
    enabled: false
    # Supported providers in this chart: s3, gcs
    provider: s3
    destinationPath: "s3://{{ .Release.Namespace }}/{{ default (printf \"%s/%s\" .Release.Name (include \"postgresql.fullname\" .)) .Values.global.clusterIdentity }}"
    # Use endpointURL for S3-compatible targets such as MinIO.
    endpointURL: "http://my-minio-minio.storage.svc:9000"
    # Optional CA bundle secret for private/self-signed HTTPS endpoints.
    endpointCA:
      secretName: ""
      secretKey: ca.crt
    # Used when provider=gcs.
    credentialSecret: "gcs-credentials"
    # Used when provider=s3.
    s3Credentials:
      accessKeyId:
        secretName: ""
        key: root-user
      secretAccessKey:
        secretName: ""
        key: root-password
      region:
        secretName: ""
        key: region
    retentionPolicy: "7d"
    schedule:
      enabled: true
      # CloudNativePG uses a 6-field cron format with seconds.
      # Daily at 02:00 UTC: 0 0 2 * * *
      # Every 6 hours:      0 0 */6 * * *
      # Weekly at Sun 03:00 UTC: 0 0 3 * * 0
      cron: "0 0 2 * * *"
      timeZone: UTC
      immediate: false
      suspend: false
      backupOwnerReference: self

  # Optional PgBouncer layer in front of the primary/read-only service.
  pooler:
    enabled: true
    # Keep a distinct name so the Pooler service cannot be confused with the
    # cluster's built-in -rw service.
    name: pooler-rw
    type: rw
    instances: 3
    pgbouncer:
      poolMode: transaction
      parameters:
        # Keep client sessions above expected app concurrency, but not so high
        # that spikes hide real saturation. Tune with Spring Hikari settings.
        max_client_conn: "200"
        # Size backend pools conservatively relative to PostgreSQL max_connections.
        default_pool_size: "20"
    authBootstrap:
      # CNPG normally creates the pooler auth role automatically, but when this
      # chart supplies external bootstrap/superuser secrets we must ensure the
      # role and auth lookup function exist for PgBouncer.
      enabled: true
      image: postgres:16-alpine
      backoffLimit: 6
      activeDeadlineSeconds: 600
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    bootstrapControllerResources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    monitoring:
      # Same default as the cluster-level setting: disable CNPG-managed
      # PodMonitor generation unless explicitly requested.
      enablePodMonitor: false
      standalonePodMonitor:
        enabled: true
        interval: 30s
        scrapeTimeout: 10s
        labels:
          release: prometheus-stack1-release

  alerts:
    enabled: true
    prometheusRuleLabels:
      release: prometheus-stack-release
    storage:
      enabled: true
      warningPercent: 80
      criticalPercent: 90
      for: 10m

  # - name: downstream-subscription
  #   database: appdb
  #   subscriptionName: app_subscription
  #   externalClusterName: upstream
  #   publicationName: app_publication
  #   publicationDBName: appdb
  #   subscriptionReclaimPolicy: retain
  #   parameters: {}

# =============================================================================
# MONGODB — Percona Operator for MongoDB
# =============================================================================
mongodb:
  # MongoDB replica-set values and TLS behavior.
  # MongoDB keeps its own operator-native backup task flow and direct/service-based
  # connection handling instead of a PostgreSQL Pooler CRD.
  enabled: false
  # Optional existing Secret containing the full MongoDB operator credential
  # payload. When set, Helm will not create the release-scoped credentials
  # Secret from values.
  externalSecretRef: ""
  # MongoDB replica-set self-identification must match the kubelet-managed pod
  # FQDN domain. This cluster resolves service names under `svc.benzcluster`.
  clusterServiceDNSSuffix: benzcluster
  clusterServiceDNSMode: Internal
  # MongoDB connection handling stays driver/operator-native. Use replica set
  # services internally and split horizons when external member endpoints are
  # required.
  connectionHandling:
    enabled: true
    mode: driver
  operator:
    enabled: false
  connection:
    username: databaseAdmin
    password: ""
    port: 17017
  credentials:
    clusterAdminUser: clusterAdmin
    clusterAdminPassword: "MongoClusterAdminChangeMe123!"
    userAdminUser: userAdmin
    userAdminPassword: "MongoUserAdminChangeMe123!"
    clusterMonitorUser: clusterMonitor
    clusterMonitorPassword: "MongoClusterMonitorChangeMe123!"
    # Kept for backward compatibility. mongodb.connection.username/password is
    # used for the request-facing database admin account.
    databaseAdminUser: databaseAdmin
    databaseAdminPassword: ""
    backupUser: backup
    backupPassword: "MongoBackupChangeMe123!"
    replicationKey: "MongoReplicationKeyChangeMe1234567890"
  externalAccess:
    # Enable split-horizon external access by default for MongoDB so clients can
    # connect through the TCP proxy using public member hostnames on port 27017.
    enabled: true
    replicaSetHorizons:
      enabled: true
      basePort: 27017
      serviceType: ClusterIP
    publicHostnames:
      - mongo-db-0.seang.shop
      - mongo-db-1.seang.shop
      - mongo-db-2.seang.shop
  tls:
    # External replica-set access through the shared TCP proxy relies on TLS
    # SNI to route each public hostname to the correct MongoDB member. Keep TLS
    # on by default and let cert-manager issue the certs that include the
    # public hostnames plus internal service DNS names.
    enabled: true
    mode: certManager
    # The Percona MongoDB operator manages MongoDB TLS certificates itself.
    # Keep this false so Helm does not race the operator for the same secrets.
    renderCertificates: false
    sslSecretName: ""
    sslInternalSecretName: ""
    certManager:
      generateCA: true
      issuer:
        name: ""
        kind: ClusterIssuer
        group: cert-manager.io

  cluster:
    # Replica set members plus operator-safe base config. Avoid forcing
    # clusterAuthX509 subject attributes here unless your TLS certs are issued
    # with an exact matching DN.
    crVersion: "1.22.0"
    instances: 3
    image: percona/percona-server-mongodb:7.0.30-16
    configuration: |
      net:
        tls:
          allowConnectionsWithoutCertificates: true
    env:
      - name: PATH
        value: /opt/percona:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    sidecars:
      - name: mongo-compat
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -c
          - |
            cat >/opt/percona/mongo <<'EOW'
            #!/bin/sh
            exec /usr/bin/mongosh "$@"
            EOW
            chmod +x /opt/percona/mongo
            sleep infinity
        volumeMounts:
          - name: bin
            mountPath: /opt/percona
        resources:
          requests:
            cpu: "25m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
    probes:
      # MongoDB replica set bootstrap and user creation can take several
      # minutes on Longhorn. The operator defaults are too aggressive and can
      # push the pods into a restart loop before initialization settles.
      livenessInitialDelaySeconds: 1800
      livenessTimeoutSeconds: 30
      livenessPeriodSeconds: 30
      livenessFailureThreshold: 10
      livenessStartupDelaySeconds: 7200
      readinessInitialDelaySeconds: 60
      readinessTimeoutSeconds: 10
      readinessPeriodSeconds: 10
      readinessFailureThreshold: 30
    resources:
      requests:
        cpu: "200m"
        memory: "768Mi"
      limits:
        cpu: "600m"
        memory: "1536Mi"

  storage:
    # Size of each MongoDB member's persistent volume.
    size: 4Gi
    storageClass: longhorn

  backup:
    # Percona backup jobs use the namespace as the bucket and store backups
    # under <release>/<cluster>.
    enabled: false
    image: percona/percona-backup-mongodb:2.12.0
    startingDeadlineSeconds: 600
    storageType: s3
    task:
      name: daily-backup
      schedule: "10 2 * * *"
      timeZone: UTC
      compressionType: gzip
    s3:
      bucket: "{{ .Release.Namespace }}"
      region: us-east-1
      credentialSecret: ""
      endpointURL: "http://my-minio-minio.storage.svc:9000"
      prefix: "{{ default (printf \"%s/%s\" .Release.Name (include \"mongodb.fullname\" .)) .Values.global.clusterIdentity }}"

  alerts:
    enabled: true
    prometheusRuleLabels:
      release: prometheus-stack-release
    storage:
      enabled: true
      warningPercent: 80
      criticalPercent: 90
      for: 10m

  monitoring:
    # MongoDB uses a Prometheus exporter sidecar plus PodMonitor.
    enabled: true
    exporter:
      enabled: true
      image: percona/mongodb_exporter:0.40
      resources:
        requests:
          cpu: "25m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
    podMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s
      labels:
        release: prometheus-stack-release

# =============================================================================
# MYSQL — Percona Operator for MySQL (PXC)
# =============================================================================
mysql:
  # MySQL/PXC values and external access settings.
  # Connection fan-in is handled by the operator-managed HAProxy layer rather
  # than a PostgreSQL-style Pooler object.
  enabled: false
  # Optional existing Secret for MySQL operator/bootstrap credentials. When
  # set, Helm will not create the release-scoped MySQL Secrets from values.
  # The Secret must contain the operator keys plus `init-users.sql`.
  externalSecretRef: ""
  connectionHandling:
    enabled: true
    mode: haproxy
  operator:
    enabled: false
  connection:
    username: appuser
    password: ""
    port: 13306
  credentials:
    # Internal/operator credentials can stay at chart defaults. The application
    # user should be supplied through mysql.connection.
    rootPassword: "MysqlRootChangeMe123!"
    replicationPassword: "MysqlReplicationChangeMe123!"
    monitorPassword: "MysqlMonitorChangeMe123!"
    clusterCheckPassword: "MysqlClusterCheckChangeMe123!"
  externalAccess:
    # External hostnames are only used when the database is intentionally public.
    enabled: true
    loadBalancerClass: ""
    loadBalancerSourceRanges: []
    annotations: {}
    labels: {}
    # Add public DNS names here so cert-manager includes them in the database
    # server certificate SANs. Example: mysql-db.example.com
    publicHostnames:
      - mysql-db.seang.shop
  tls:
    enabled: true
    mode: certManager
    sslSecretName: ""
    sslInternalSecretName: ""
    certManager:
      generateCA: true
      issuer:
        name: ""
        kind: ClusterIssuer
        group: cert-manager.io

  haproxy:
    # MySQL/PXC uses operator-managed HAProxy as the connection-handling layer.
    enabled: true
    # The Percona operator enforces at least two HAProxy replicas as a safe
    # default. Match that here to avoid endless reconciliation churn.
    size: 2
    # Readiness can fail safely while PXC is bootstrapping. Delay HAProxy
    # readiness until PXC has had enough time to expose a stable backend,
    # avoiding noisy "reading initial communication packet" startup warnings.
    readinessDelaySeconds: 900
    readinessTimeoutSeconds: 15
    livenessDelaySeconds: 1800
    livenessTimeoutSeconds: 15
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
    # master01 does not have Longhorn CSI, so keep operator HAProxy off it.
    excludeHostnames:
      - master01
    nodeSelector: {}
    tolerations: []
    affinity: {}

  cluster:
    # Percona PXC enforces a three-node safe default. Keep the chart aligned
    # with the operator to avoid repeated size reconciliation during bootstrap.
    instances: 3
    image: percona/percona-xtradb-cluster:8.0
    # HAProxy health checks connect to the MySQL admin interface on 33062.
    # Percona 8.0.45 exposes this through admin-port rather than the older
    # extra_port setting, so render it explicitly in the operator config.
    # The requested app database/user/password are applied by the chart's
    # app-user bootstrap Job after PXC is reachable.
    configuration: |
      [mysqld]
      admin-port=33062
    # master01 does not have Longhorn CSI, so keep PXC members off it.
    excludeHostnames:
      - master01
    nodeSelector: {}
    tolerations: []
    affinity: {}
    probes:
      # Longhorn-backed initial bootstrap can take several minutes. Give the
      # PXC admin interface on 33062 enough time to open before readiness probes
      # start, otherwise kubelet records noisy expected startup warnings.
      readinessDelaySeconds: 900
      readinessTimeoutSeconds: 20
      livenessDelaySeconds: 1800
      livenessTimeoutSeconds: 20
    resources:
      requests:
        cpu: "250m"
        memory: "768Mi"
      limits:
        cpu: "600m"
        memory: "1536Mi"

  storage:
    # Persistent volume size for the MySQL data directory.
    size: 4Gi
    storageClass: longhorn

  backup:
    # PXC backups use the namespace as the bucket.
    enabled: false
    image: percona/percona-xtradb-cluster-operator:1.14.0-pxc8.0-backup-pxb8.0.35
    schedule:
      name: daily-backup
      cron: "20 2 * * *"
      timeZone: UTC
      keep: 7
    s3:
      bucket: "{{ .Release.Namespace }}"
      region: us-east-1
      credentialSecret: ""
      endpointURL: "http://my-minio-minio.storage.svc:9000"
      prefix: "{{ default .Release.Name .Values.global.clusterIdentity }}"
  alerts:
    enabled: true
    prometheusRuleLabels:
      release: prometheus-stack-release
    storage:
      enabled: true
      warningPercent: 80
      criticalPercent: 90
      for: 10m

  monitoring:
    # MySQL/PXC uses a Prometheus exporter sidecar plus PodMonitor.
    enabled: true
    exporter:
      enabled: true
      image: prom/mysqld-exporter:v0.19.0
      resources:
        requests:
          cpu: "25m"
          memory: "64Mi"
        limits:
          cpu: "50m"
          memory: "128Mi"
    podMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s
      labels:
        release: prometheus-stack-release

# =============================================================================
# REDIS — OpsTree Redis Operator
# =============================================================================
redis:
  # Redis cluster values and TLS settings.
  # Redis keeps direct cluster connectivity. Use the exporter for metrics and
  # the external TCP proxy for public access when needed.
  enabled: false
  # Optional existing Secret for Redis credentials. When set, Helm will not
  # create the release-scoped Redis Secret from values. The Secret must expose
  # `username` and `password` keys.
  externalSecretRef: ""
  # Redis connection handling is client-native. Applications should use their
  # own Redis client pools; this chart does not add a separate proxy layer.
  connectionHandling:
    enabled: true
    mode: client
  operator:
    enabled: false
  connection:
    username: default
    password: ""
    aclPermissions: "+@read +@write +@keyspace +@connection"
    port: 16379
  auth:
    # Kept for backward compatibility. redis.connection.password is used for
    # new request-driven deployments.
    username: default
    password: ""
    aclPermissions: "+@read +@write +@keyspace +@connection"
  externalAccess:
    # Public hostname for Redis when exposing it outside the cluster.
    enabled: true
    publicHostnames:
      - redis-db.seang.shop
  tls:
    enabled: true
    secretName: ""
    caKey: ca.crt
    certKey: tls.crt
    privateKeyKey: tls.key
    certManager:
      generateCA: true
      issuer:
        name: ""
        kind: ClusterIssuer
        group: cert-manager.io

  cluster:
    # Redis is small and memory-sensitive, so requests stay modest.
    instances: 3
    image: redis:7.2-alpine
    probes:
      # The operator's default TLS exec probes only allow a 1s timeout, which
      # is too aggressive during initial cluster bootstrap on Longhorn-backed
      # storage. Give the first leader enough time to answer redis-cli --tls
      # health checks so the StatefulSet can advance to the remaining members.
      readinessInitialDelaySeconds: 30
      readinessTimeoutSeconds: 10
      readinessPeriodSeconds: 10
      readinessFailureThreshold: 12
      livenessInitialDelaySeconds: 120
      livenessTimeoutSeconds: 10
      livenessPeriodSeconds: 20
      livenessFailureThreshold: 6
    resources:
      requests:
        cpu: "75m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "512Mi"

  storage:
    # Redis cluster mode needs a writable node-conf volume for nodes.conf.
    nodeConfVolume: true
    nodeConfSize: 1Gi
    nodeConfStorageClass: longhorn
    # Smaller volume than the SQL databases because Redis data is usually lighter.
    size: 5Gi
    storageClass: longhorn

  backup:
    # Redis does not have an operator-native scheduled backup CR in this chart,
    # so backups are produced by a CronJob that runs redis-cli --rdb and uploads
    # the snapshot to MinIO/S3.
    enabled: false
    image: alpine:3.20
    imagePullPolicy: IfNotPresent
    schedule:
      enabled: true
      cron: "40 2 * * *"
      timeZone: UTC
    s3:
      bucket: "{{ .Release.Namespace }}"
      credentialSecret: ""
      accessKeyKey: root-user
      secretKeyKey: root-password
      endpointURL: "http://my-minio-minio.storage.svc:9000"
      prefix: "{{ default (printf \"%s/%s\" .Release.Name (include \"redis.fullname\" .)) .Values.global.clusterIdentity }}"

  exporter:
    # Redis metrics are exposed through the operator's native redis-exporter.
    enabled: true
    image: quay.io/opstree/redis-exporter:v1.44.0

  monitoring:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s
      namespace: ""

  alerts:
    enabled: true
    prometheusRuleLabels:
      release: prometheus-stack-release
    storage:
      enabled: true
      warningPercent: 80
      criticalPercent: 90
      for: 10m

# =============================================================================
# CASSANDRA — K8ssandra Operator
# =============================================================================
cassandra:
  # Cassandra uses the chart-managed TLS bootstrap path.
  # Cassandra keeps its own Medusa backup schedule and direct service-based
  # connectivity instead of a PostgreSQL Pooler.
  enabled: false
  # Optional existing Secret for the Cassandra superuser. When set, Helm will
  # not create the release-scoped Cassandra credentials Secret from values.
  # The Secret must expose `username` and `password` keys.
  externalSecretRef: ""
  # Cassandra connection handling is driver-native. Applications should rely on
  # Cassandra driver session pooling instead of a standalone proxy/pooler CRD.
  connectionHandling:
    enabled: true
    mode: driver
  operator:
    enabled: false
  connection:
    username: cassandra
    password: ""
    port: 19042
  credentials:
    # Kept for backward compatibility. cassandra.connection is used for new
    # request-driven deployments.
    username: cassandra
    password: ""
  externalAccess:
    # Public hostname used by HAProxy and the TLS bootstrap job.
    enabled: true
    publicHostnames:
      - cassandra-db.seang.shop
  tls:
    enabled: true
    # Encrypt client traffic; keep client cert auth off for normal external access.
    clientEncryption: true
    # Set to true only if you want mTLS for clients as well as internode encryption.
    requireClientAuth: false
    # Internode encryption is on by default because Cassandra recommends it.
    internodeEncryption: all
    # The subchart generates the JKS secrets automatically during Helm install/upgrade.
    createSecrets: true
    # Leave blank to get release-unique secret names. The chart also treats the
    # old shared names as legacy values and falls back to release-unique names.
    serverSecretName: ""
    clientSecretName: ""
    # Leave blank to let the TLS bootstrap job generate internal passwords.
    serverSecret:
      keystorePassword: ""
      truststorePassword: ""
    clientSecret:
      keystorePassword: ""
      truststorePassword: ""
    # When Cassandra is disabled, the next upgrade removes the datacenter and PVCs.
    # Keep the cleanup logic itself available, but require an explicit opt-in so
    # MySQL/PostgreSQL/MongoDB releases do not run Cassandra cleanup jobs just
    # because Cassandra is disabled in the umbrella chart.
    cleanupOnDisable: true
  cleanup:
    # Explicitly opt in only when intentionally tearing down a Cassandra
    # release. Leaving this false prevents stray cleanup jobs during unrelated
    # database deploys.
    enabled: false
  cluster:
    # Default target is three nodes, but the chart now bootstraps at one node
    # first and then scales the datacenter up after pod 0 becomes Ready.
    instances: 3
    serverVersion: "4.1.3"
    image: k8ssandra/cass-management-api:4.1.3
    config:
      # Leave blank to derive a unique K8ssandra cluster name from the Helm
      # release. This prevents different Cassandra releases from colliding on
      # the same generated StatefulSet, Service, PVC, and CassandraDatacenter names.
      clusterName: ""
      datacenter: ""
      # Cap the Cassandra JVM heap explicitly so the process leaves enough
      # headroom for native memory, TLS, off-heap usage, and the management API.
      jvmOptions:
        heap_initial_size: "1024M"
        heap_max_size: "1536M"
    resources:
      requests:
        cpu: "300m"
        memory: "1536Mi"
      limits:
        cpu: "1000m"
        memory: "3Gi"
    probes:
      # Cassandra first-node startup is slow with TLS, Medusa, and Longhorn.
      # Keep readiness fairly chatty, but delay liveness long enough that
      # kubelet does not kill the pod before the node finishes bootstrapping.
      readinessInitialDelaySeconds: 30
      readinessTimeoutSeconds: 10
      readinessPeriodSeconds: 10
      readinessFailureThreshold: 60
      livenessInitialDelaySeconds: 180
      livenessTimeoutSeconds: 10
      livenessPeriodSeconds: 15
      livenessFailureThreshold: 12
    configBuilderResources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
    systemLoggerResources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"

  storage:
    # Persistent volume size for each Cassandra node.
    size: 4Gi
    storageClass: longhorn

  backup:
    # Medusa uses the namespace as the bucket and stores backups under
    # <release>/<cluster>.
    enabled: false
    medusaImage: k8ssandra/medusa:0.14.0
    schedule:
      enabled: true
      cron: "30 3 * * *"
      timeZone: UTC
      disabled: false
      backupType: differential
    s3:
      provider: s3_compatible
      bucket: "{{ .Release.Namespace }}"
      region: us-east-1
      credentialSecret: ""
      prefix: "{{ default (printf \"%s/%s\" .Release.Name (include \"cassandra.fullname\" .)) .Values.global.clusterIdentity }}"
      host: my-minio-minio.storage.svc
      port: 9000
      secure: false

  alerts:
    enabled: true
    prometheusRuleLabels:
      release: prometheus-stack-release
    storage:
      enabled: true
      warningPercent: 80
      criticalPercent: 90
      for: 10m

  monitoring:
    enabled: true
    prometheus:
      enabled: true
      commonLabels:
        release: prometheus-stack-release
 
