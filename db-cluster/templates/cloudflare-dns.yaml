{{- if .Values.cloudflare.enabled }}
{{- $allHosts := list -}}
{{- if .Values.postgresql.enabled }}
{{- $allHosts = concat $allHosts (.Values.postgresql.externalAccess.publicHostnames | default list) -}}
{{- end }}
{{- if .Values.mysql.enabled }}
{{- $allHosts = concat $allHosts (.Values.mysql.externalAccess.publicHostnames | default list) -}}
{{- end }}
{{- if .Values.mongodb.enabled }}
{{- $allHosts = concat $allHosts (.Values.mongodb.externalAccess.publicHostnames | default list) -}}
{{- end }}
{{- if .Values.redis.enabled }}
{{- $allHosts = concat $allHosts (.Values.redis.externalAccess.publicHostnames | default list) -}}
{{- end }}
{{- if .Values.cassandra.enabled }}
{{- $allHosts = concat $allHosts (.Values.cassandra.externalAccess.publicHostnames | default list) -}}
{{- end }}
{{- if not .Values.cloudflare.apiTokenExistingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-cloudflare-api-token
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  {{ .Values.cloudflare.apiTokenSecretKey }}: {{ .Values.cloudflare.apiToken | quote }}
---
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-cloudflare-dns
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: sync-dns
        image: python:3.12-alpine
        env:
        - name: CLOUDFLARE_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cloudflare.apiTokenExistingSecret | default (printf "%s-cloudflare-api-token" .Release.Name) }}
              key: {{ .Values.cloudflare.apiTokenSecretKey }}
        - name: CLOUDFLARE_ZONE_NAME
          value: {{ .Values.cloudflare.zoneName | quote }}
        - name: CLOUDFLARE_EXTERNAL_IP
          value: {{ .Values.cloudflare.externalIP | quote }}
        - name: CLOUDFLARE_PROXIED
          value: {{ ternary "true" "false" .Values.cloudflare.proxied | quote }}
        - name: CLOUDFLARE_TTL
          value: {{ .Values.cloudflare.ttl | quote }}
        - name: DNS_RECORDS_JSON
          value: {{ toJson $allHosts | quote }}
        command:
        - /bin/sh
        - -ec
        - |
          python3 <<'PY'
          import json
          import os
          import ssl
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ.get("CLOUDFLARE_API_TOKEN", "").strip()
          zone_name = os.environ.get("CLOUDFLARE_ZONE_NAME", "").strip()
          external_ip = os.environ.get("CLOUDFLARE_EXTERNAL_IP", "").strip()
          ttl = int(os.environ.get("CLOUDFLARE_TTL", "1"))
          proxied = os.environ.get("CLOUDFLARE_PROXIED", "false").lower() == "true"
          records = [r.strip() for r in json.loads(os.environ.get("DNS_RECORDS_JSON", "[]")) if r.strip()]

          if not token:
              raise SystemExit("Cloudflare API token is required")
          if not zone_name:
              raise SystemExit("cloudflare.zoneName is required")
          if not external_ip:
              raise SystemExit("cloudflare.externalIP is required")
          if not records:
              print("No public hostnames configured; nothing to sync")
              raise SystemExit(0)

          base = "https://api.cloudflare.com/client/v4"
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
          }

          def request(method, path, payload=None):
              url = base + path
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req, context=ssl.create_default_context()) as resp:
                      body = resp.read().decode("utf-8")
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", errors="replace")
                  raise SystemExit(f"Cloudflare API error {exc.code}: {body}")
              result = json.loads(body)
              if not result.get("success"):
                  raise SystemExit(f"Cloudflare API request failed: {body}")
              return result["result"]

          zone_query = urllib.parse.quote(zone_name, safe="")
          zones = request("GET", f"/zones?name={zone_query}")
          if not zones:
              raise SystemExit(f"Cloudflare zone not found: {zone_name}")
          zone_id = zones[0]["id"]

          for record_name in records:
              search_name = urllib.parse.quote(record_name, safe="")
              existing = request("GET", f"/zones/{zone_id}/dns_records?type=A&name={search_name}")
              payload = {
                  "type": "A",
                  "name": record_name,
                  "content": external_ip,
                  "ttl": ttl,
                  "proxied": proxied,
              }
              if existing:
                  record_id = existing[0]["id"]
                  updated = request("PUT", f"/zones/{zone_id}/dns_records/{record_id}", payload)
                  print(f"Updated DNS record {updated['name']} -> {updated['content']}")
              else:
                  created = request("POST", f"/zones/{zone_id}/dns_records", payload)
                  print(f"Created DNS record {created['name']} -> {created['content']}")
          PY
{{- end }}
