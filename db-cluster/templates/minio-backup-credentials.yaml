{{- if or (and .Values.mongodb.enabled .Values.mongodb.backup.enabled) (and .Values.mysql.enabled .Values.mysql.backup.enabled) (and .Values.cassandra.enabled .Values.cassandra.backup.enabled) }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-backup-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: minio-backup-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        credentials: |
          [default]
          aws_access_key_id = {{ `{{ .AWS_ACCESS_KEY_ID }}` }}
          aws_secret_access_key = {{ `{{ .AWS_SECRET_ACCESS_KEY }}` }}
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: minio
        property: root-user
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: minio
        property: root-password
{{- end }}
