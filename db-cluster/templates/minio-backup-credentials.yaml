apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-credentials-{{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: minio-credentials-{{ .Release.Name }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        root-user: '{{ `{{ index . "root-user" }}` }}'
        root-password: '{{ `{{ index . "root-password" }}` }}'
        credentials: |
          [default]
          aws_access_key_id = {{ `{{ index . "root-user" }}` }}
          aws_secret_access_key = {{ `{{ index . "root-password" }}` }}
  data:
    - secretKey: root-user
      remoteRef:
        key: minio
        property: root-user
    - secretKey: root-password
      remoteRef:
        key: minio
        property: root-password
