{{- $defaultMinioCredentialSecret := printf "minio-credentials-%s" .Release.Name -}}

{{- $pg := .Values.postgresql | default dict -}}
{{- $pgBackup := get $pg "backup" | default dict -}}
{{- $pgS3Credentials := get $pgBackup "s3Credentials" | default dict -}}
{{- $pgAccessKey := get $pgS3Credentials "accessKeyId" | default dict -}}
{{- $pgSecretAccessKey := get $pgS3Credentials "secretAccessKey" | default dict -}}
{{- $pgAccessKeySecretNameTpl := get $pgAccessKey "secretName" | default $defaultMinioCredentialSecret -}}
{{- $pgSecretAccessKeySecretNameTpl := get $pgSecretAccessKey "secretName" | default $pgAccessKeySecretNameTpl -}}
{{- $pgAccessKeySecretName := tpl $pgAccessKeySecretNameTpl . -}}
{{- $pgSecretAccessKeySecretName := tpl $pgSecretAccessKeySecretNameTpl . -}}
{{- $pgNeedsMinioCredentials := and ($pg.enabled | default false) ($pgBackup.enabled | default false) (ne (get $pgBackup "provider" | default "s3") "gcs") (or (eq $pgAccessKeySecretName $defaultMinioCredentialSecret) (eq $pgSecretAccessKeySecretName $defaultMinioCredentialSecret)) -}}

{{- $mongodb := .Values.mongodb | default dict -}}
{{- $mongodbBackup := get $mongodb "backup" | default dict -}}
{{- $mongodbS3 := get $mongodbBackup "s3" | default dict -}}
{{- $mongodbCredentialSecret := tpl (get $mongodbS3 "credentialSecret" | default $defaultMinioCredentialSecret) . -}}
{{- $mongodbNeedsMinioCredentials := and ($mongodb.enabled | default false) ($mongodbBackup.enabled | default false) (eq $mongodbCredentialSecret $defaultMinioCredentialSecret) -}}

{{- $mysql := .Values.mysql | default dict -}}
{{- $mysqlBackup := get $mysql "backup" | default dict -}}
{{- $mysqlS3 := get $mysqlBackup "s3" | default dict -}}
{{- $mysqlCredentialSecret := tpl (get $mysqlS3 "credentialSecret" | default $defaultMinioCredentialSecret) . -}}
{{- $mysqlNeedsMinioCredentials := and ($mysql.enabled | default false) ($mysqlBackup.enabled | default false) (eq $mysqlCredentialSecret $defaultMinioCredentialSecret) -}}

{{- $redis := .Values.redis | default dict -}}
{{- $redisBackup := get $redis "backup" | default dict -}}
{{- $redisS3 := get $redisBackup "s3" | default dict -}}
{{- $redisCredentialSecret := tpl (get $redisS3 "credentialSecret" | default $defaultMinioCredentialSecret) . -}}
{{- $redisNeedsMinioCredentials := and ($redis.enabled | default false) ($redisBackup.enabled | default false) (eq $redisCredentialSecret $defaultMinioCredentialSecret) -}}

{{- $cassandra := .Values.cassandra | default dict -}}
{{- $cassandraBackup := get $cassandra "backup" | default dict -}}
{{- $cassandraS3 := get $cassandraBackup "s3" | default dict -}}
{{- $cassandraCredentialSecret := tpl (get $cassandraS3 "credentialSecret" | default $defaultMinioCredentialSecret) . -}}
{{- $cassandraNeedsMinioCredentials := and ($cassandra.enabled | default false) ($cassandraBackup.enabled | default false) (eq $cassandraCredentialSecret $defaultMinioCredentialSecret) -}}

{{- if or $pgNeedsMinioCredentials $mongodbNeedsMinioCredentials $mysqlNeedsMinioCredentials $redisNeedsMinioCredentials $cassandraNeedsMinioCredentials }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-credentials-{{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: minio-credentials-{{ .Release.Name }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        AWS_ACCESS_KEY_ID: '{{ `{{ index . "root-user" }}` }}'
        AWS_SECRET_ACCESS_KEY: '{{ `{{ index . "root-password" }}` }}'
        root-user: '{{ `{{ index . "root-user" }}` }}'
        root-password: '{{ `{{ index . "root-password" }}` }}'
        credentials: |
          [default]
          aws_access_key_id = {{ `{{ index . "root-user" }}` }}
          aws_secret_access_key = {{ `{{ index . "root-password" }}` }}
  data:
    - secretKey: root-user
      remoteRef:
        key: minio
        property: root-user
    - secretKey: root-password
      remoteRef:
        key: minio
        property: root-password
{{- end }}
