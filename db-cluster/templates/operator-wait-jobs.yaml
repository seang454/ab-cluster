{{- $operatorNamespaces := .Values.operatorNamespaces | default dict -}}
{{- if .Values.postgresql.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-cnpg-operator
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
spec:
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-operator-waiter
      restartPolicy: OnFailure
      containers:
      - name: wait
        image: bitnami/kubectl:latest
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for CloudNativePG operator..."
          kubectl rollout status deployment/cnpg-cloudnative-pg \
            -n {{ ($operatorNamespaces.cnpg | default "cnpg-system") | quote }} --timeout=300s
          echo "CloudNativePG operator is ready"
{{- end }}
