{{- $proxy := .Values.externalTcpProxy | default dict -}}
{{- $expose := $proxy.expose | default dict -}}
{{- $ports := $proxy.ports | default dict -}}
{{- $cassandra := .Values.cassandra | default dict -}}
{{- $cassandraCluster := dig "cluster" "config" "clusterName" "" $cassandra -}}
{{- $cassandraDatacenter := dig "cluster" "config" "datacenter" "dc1" $cassandra -}}
{{- $mongoExt := .Values.mongodb.externalAccess | default dict -}}
{{- $mongoHorizons := get $mongoExt "replicaSetHorizons" | default dict -}}
{{- $mongoPublicHosts := $mongoExt.publicHostnames | default list -}}
{{- $mongoCluster := .Values.mongodb.cluster | default dict -}}
{{- $mongoInstances := int (get $mongoCluster "instances" | default 1) -}}
{{- $mongoHorizonsEnabled := and .Values.mongodb.enabled ($expose.mongodb | default true) ($mongoExt.enabled | default false) ($mongoHorizons.enabled | default false) (gt (len $mongoPublicHosts) 0) -}}
{{- $pg := .Values.postgresql | default dict -}}
{{- $pgProxy := get $proxy "postgresql" | default dict -}}
{{- $proxyClusterDomain := get $proxy "clusterDomain" | default "" -}}
{{- $pgExternalBackendAddress := get $pgProxy "backendAddress" | default "" -}}
{{- $pgExternalBackendService := get $pgProxy "backendServiceName" | default (printf "%s-postgresql-rw" .Release.Name) -}}
{{- $pgExternalBackendHost := printf "%s.%s.svc" $pgExternalBackendService .Release.Namespace -}}
{{- if $proxyClusterDomain -}}
{{- $pgExternalBackendHost = printf "%s.%s" $pgExternalBackendHost $proxyClusterDomain -}}
{{- end -}}
{{- if $pgExternalBackendAddress -}}
{{- $pgExternalBackendHost = $pgExternalBackendAddress -}}
{{- end -}}
{{- if $proxy.enabled }}
# Shared external TCP proxy for database traffic.
# This object is separate from the database operators and only forwards raw TCP
# from the public node entrypoint to internal Kubernetes Services.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-external-haproxy
  namespace: {{ .Release.Namespace }}
data:
  haproxy.cfg: |
    global
      log stdout format raw local0

    defaults
      log global
      mode tcp
      option tcplog
      timeout connect {{ $proxy.timeouts.connect | default "10s" }}
      timeout client {{ $proxy.timeouts.client | default "1m" }}
      timeout server {{ $proxy.timeouts.server | default "1m" }}

    # Use Kubernetes DNS from inside the pod and allow startup before every
    # backend name resolves. This prevents CrashLoopBackOff during cluster
    # bootstrap when headless services or endpoints are not ready yet.
    resolvers kube_dns
      parse-resolv-conf
      accepted_payload_size 8192
      hold valid 10s

    {{- if and .Values.postgresql.enabled ($expose.postgresql | default true) }}
    # Public PostgreSQL listener -> internal CNPG read-write service.
    frontend postgresql_frontend
      bind *:{{ $ports.postgresql | default 5432 }}
      default_backend postgresql_backend

    backend postgresql_backend
      # Use plain TCP passthrough to the CNPG RW service. Active HAProxy health
      # checks were marking this single backend unavailable even though the
      # service was reachable from inside the proxy pod.
      server postgresql {{ $pgExternalBackendHost }}:5432 resolvers kube_dns resolve-prefer ipv4 init-addr libc,none
    {{ end }}

    {{- if and .Values.mysql.enabled ($expose.mysql | default true) }}
    # Public MySQL listener -> internal MySQL HAProxy service managed by PXC.
    frontend mysql_frontend
      bind *:{{ $ports.mysql | default 3306 }}
      default_backend mysql_backend

    backend mysql_backend
      server mysql {{ .Release.Name }}-mysql-haproxy.{{ .Release.Namespace }}.svc:3306 check resolvers kube_dns init-addr none
    {{ end }}

    {{- if $mongoHorizonsEnabled }}
    # Public MongoDB listener for replica-set members selected by TLS SNI.
    frontend mongodb_frontend
      bind *:{{ $ports.mongodb | default 27017 }}
      tcp-request inspect-delay 5s
      tcp-request content accept if { req.ssl_hello_type 1 }
      {{- range $i, $host := $mongoPublicHosts }}
      use_backend mongodb_backend_{{ $i }} if { req.ssl_sni -i {{ $host }} }
      {{- end }}
      default_backend mongodb_backend_0

    {{- range $i, $_ := until $mongoInstances }}
    backend mongodb_backend_{{ $i }}
      # Use raw TCP passthrough without active health checks. MongoDB now
      # requires TLS on these member ports, and HAProxy's default check marks
      # otherwise healthy backends down during certificate/auth rotation.
      server mongodb{{ $i }} {{ $.Release.Name }}-mongodb-rs0-{{ $i }}.{{ $.Release.Name }}-mongodb-rs0.{{ $.Release.Namespace }}.svc:27017 resolvers kube_dns init-addr none
    {{- end }}
    {{- else if and .Values.mongodb.enabled ($expose.mongodb | default true) }}
    # Public MongoDB listener -> internal replica set service.
    frontend mongodb_frontend
      bind *:{{ $ports.mongodb | default 27017 }}
      default_backend mongodb_backend

    backend mongodb_backend
      server mongodb {{ .Release.Name }}-mongodb-rs0.{{ .Release.Namespace }}.svc:27017 check resolvers kube_dns init-addr none
    {{ end }}

    {{- if and .Values.redis.enabled ($expose.redis | default true) }}
    # Public Redis listener -> internal Redis leader service.
    frontend redis_frontend
      bind *:{{ $ports.redis | default 6379 }}
      default_backend redis_backend

    backend redis_backend
      server redis {{ .Release.Name }}-redis-leader.{{ .Release.Namespace }}.svc:6379 check resolvers kube_dns init-addr none
    {{ end }}

    {{- if and .Values.cassandra.enabled ($expose.cassandra | default true) }}
    # Public Cassandra listener -> internal Cassandra service.
    frontend cassandra_frontend
      bind *:{{ $ports.cassandra | default 9042 }}
      default_backend cassandra_backend

    backend cassandra_backend
      server cassandra {{ $cassandraCluster }}-{{ $cassandraDatacenter }}-service.{{ .Release.Namespace }}.svc:9042 check resolvers kube_dns init-addr none
    {{ end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-external-haproxy
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ $proxy.replicas | default 1 }}
  strategy:
    type: {{ $proxy.strategy | default "Recreate" }}
  selector:
    matchLabels:
      app.kubernetes.io/name: external-haproxy
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: external-haproxy
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if $proxy.hostNetwork }}
      # Host networking makes the pod listen on the node's real ports.
      # This is what allows a public IP already routed to the node to reach
      # HAProxy on ports like 5432 without using a cloud LoadBalancer.
      hostNetwork: true
      dnsPolicy: {{ $proxy.dnsPolicy | default "ClusterFirstWithHostNet" }}
      {{- end }}
      {{- with $proxy.nodeSelector }}
      # Pin the proxy to the node that receives your public traffic.
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $proxy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $proxy.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: haproxy
        image: "{{ $proxy.image.repository | default "haproxy" }}:{{ $proxy.image.tag | default "3.0-alpine" }}"
        imagePullPolicy: {{ $proxy.image.pullPolicy | default "IfNotPresent" }}
        # Expose only the ports enabled in values. Each one maps to a backend
        # service defined in haproxy.cfg above.
        ports:
        {{- if and .Values.postgresql.enabled ($expose.postgresql | default true) }}
        - name: postgresql
          containerPort: {{ $ports.postgresql | default 5432 }}
          protocol: TCP
        {{- end }}
        {{- if and .Values.mysql.enabled ($expose.mysql | default true) }}
        - name: mysql
          containerPort: {{ $ports.mysql | default 3306 }}
          protocol: TCP
        {{- end }}
        {{- if $mongoHorizonsEnabled }}
        - name: mongodb
          containerPort: {{ $ports.mongodb | default 27017 }}
          protocol: TCP
        {{- else if and .Values.mongodb.enabled ($expose.mongodb | default true) }}
        - name: mongodb
          containerPort: {{ $ports.mongodb | default 27017 }}
          protocol: TCP
        {{- end }}
        {{- if and .Values.redis.enabled ($expose.redis | default true) }}
        - name: redis
          containerPort: {{ $ports.redis | default 6379 }}
          protocol: TCP
        {{- end }}
        {{- if and .Values.cassandra.enabled ($expose.cassandra | default true) }}
        - name: cassandra
          containerPort: {{ $ports.cassandra | default 9042 }}
          protocol: TCP
        {{- end }}
        {{- with $proxy.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: config
          mountPath: /usr/local/etc/haproxy/haproxy.cfg
          subPath: haproxy.cfg
      volumes:
      - name: config
        configMap:
          name: {{ .Release.Name }}-external-haproxy
{{- if $proxy.service.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-external-haproxy
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ $proxy.service.type | default "ClusterIP" }}
  selector:
    app.kubernetes.io/name: external-haproxy
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
  {{- if and .Values.postgresql.enabled ($expose.postgresql | default true) }}
  - name: postgresql
    port: {{ $ports.postgresql | default 5432 }}
    targetPort: {{ $ports.postgresql | default 5432 }}
    protocol: TCP
  {{- end }}
  {{- if and .Values.mysql.enabled ($expose.mysql | default true) }}
  - name: mysql
    port: {{ $ports.mysql | default 3306 }}
    targetPort: {{ $ports.mysql | default 3306 }}
    protocol: TCP
  {{- end }}
  {{- if $mongoHorizonsEnabled }}
  - name: mongodb
    port: {{ $ports.mongodb | default 27017 }}
    targetPort: {{ $ports.mongodb | default 27017 }}
    protocol: TCP
  {{- else if and .Values.mongodb.enabled ($expose.mongodb | default true) }}
  - name: mongodb
    port: {{ $ports.mongodb | default 27017 }}
    targetPort: {{ $ports.mongodb | default 27017 }}
    protocol: TCP
  {{- end }}
  {{- if and .Values.redis.enabled ($expose.redis | default true) }}
  - name: redis
    port: {{ $ports.redis | default 6379 }}
    targetPort: {{ $ports.redis | default 6379 }}
    protocol: TCP
  {{- end }}
  {{- if and .Values.cassandra.enabled ($expose.cassandra | default true) }}
  - name: cassandra
    port: {{ $ports.cassandra | default 9042 }}
    targetPort: {{ $ports.cassandra | default 9042 }}
    protocol: TCP
  {{- end }}
{{- end }}
{{- end }}
