{{- $proxy := .Values.externalTcpProxy | default dict -}}
{{- $expose := $proxy.expose | default dict -}}
{{- $ports := $proxy.ports | default dict -}}
{{- if $proxy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-external-haproxy
  namespace: {{ .Release.Namespace }}
data:
  haproxy.cfg: |
    global
      log stdout format raw local0

    defaults
      log global
      mode tcp
      option tcplog
      timeout connect {{ $proxy.timeouts.connect | default "10s" }}
      timeout client {{ $proxy.timeouts.client | default "1m" }}
      timeout server {{ $proxy.timeouts.server | default "1m" }}

    {{- if and .Values.postgresql.enabled ($expose.postgresql | default true) }}
    frontend postgresql_frontend
      bind *:{{ $ports.postgresql | default 5432 }}
      default_backend postgresql_backend

    backend postgresql_backend
      server postgresql {{ .Release.Name }}-postgresql-rw.{{ .Release.Namespace }}.svc.cluster.local:5432 check
    {{ end }}

    {{- if and .Values.mysql.enabled ($expose.mysql | default true) }}
    frontend mysql_frontend
      bind *:{{ $ports.mysql | default 3306 }}
      default_backend mysql_backend

    backend mysql_backend
      server mysql {{ .Release.Name }}-mysql-haproxy.{{ .Release.Namespace }}.svc.cluster.local:3306 check
    {{ end }}

    {{- if and .Values.mongodb.enabled ($expose.mongodb | default true) }}
    frontend mongodb_frontend
      bind *:{{ $ports.mongodb | default 27017 }}
      default_backend mongodb_backend

    backend mongodb_backend
      server mongodb {{ .Release.Name }}-mongodb-rs0.{{ .Release.Namespace }}.svc.cluster.local:27017 check
    {{ end }}

    {{- if and .Values.redis.enabled ($expose.redis | default true) }}
    frontend redis_frontend
      bind *:{{ $ports.redis | default 6379 }}
      default_backend redis_backend

    backend redis_backend
      server redis {{ .Release.Name }}-redis-leader.{{ .Release.Namespace }}.svc.cluster.local:6379 check
    {{ end }}

    {{- if and .Values.cassandra.enabled ($expose.cassandra | default true) }}
    frontend cassandra_frontend
      bind *:{{ $ports.cassandra | default 9042 }}
      default_backend cassandra_backend

    backend cassandra_backend
      server cassandra {{ .Release.Name }}-dc1-service.{{ .Release.Namespace }}.svc.cluster.local:9042 check
    {{ end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-external-haproxy
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ $proxy.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: external-haproxy
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: external-haproxy
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if $proxy.hostNetwork }}
      hostNetwork: true
      dnsPolicy: {{ $proxy.dnsPolicy | default "ClusterFirstWithHostNet" }}
      {{- end }}
      {{- with $proxy.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $proxy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $proxy.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: haproxy
        image: "{{ $proxy.image.repository | default "haproxy" }}:{{ $proxy.image.tag | default "3.0-alpine" }}"
        imagePullPolicy: {{ $proxy.image.pullPolicy | default "IfNotPresent" }}
        ports:
        {{- if and .Values.postgresql.enabled ($expose.postgresql | default true) }}
        - name: postgresql
          containerPort: {{ $ports.postgresql | default 5432 }}
          protocol: TCP
        {{- end }}
        {{- if and .Values.mysql.enabled ($expose.mysql | default true) }}
        - name: mysql
          containerPort: {{ $ports.mysql | default 3306 }}
          protocol: TCP
        {{- end }}
        {{- if and .Values.mongodb.enabled ($expose.mongodb | default true) }}
        - name: mongodb
          containerPort: {{ $ports.mongodb | default 27017 }}
          protocol: TCP
        {{- end }}
        {{- if and .Values.redis.enabled ($expose.redis | default true) }}
        - name: redis
          containerPort: {{ $ports.redis | default 6379 }}
          protocol: TCP
        {{- end }}
        {{- if and .Values.cassandra.enabled ($expose.cassandra | default true) }}
        - name: cassandra
          containerPort: {{ $ports.cassandra | default 9042 }}
          protocol: TCP
        {{- end }}
        {{- with $proxy.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: config
          mountPath: /usr/local/etc/haproxy/haproxy.cfg
          subPath: haproxy.cfg
      volumes:
      - name: config
        configMap:
          name: {{ .Release.Name }}-external-haproxy
{{- if $proxy.service.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-external-haproxy
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ $proxy.service.type | default "ClusterIP" }}
  selector:
    app.kubernetes.io/name: external-haproxy
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
  {{- if and .Values.postgresql.enabled ($expose.postgresql | default true) }}
  - name: postgresql
    port: {{ $ports.postgresql | default 5432 }}
    targetPort: {{ $ports.postgresql | default 5432 }}
    protocol: TCP
  {{- end }}
  {{- if and .Values.mysql.enabled ($expose.mysql | default true) }}
  - name: mysql
    port: {{ $ports.mysql | default 3306 }}
    targetPort: {{ $ports.mysql | default 3306 }}
    protocol: TCP
  {{- end }}
  {{- if and .Values.mongodb.enabled ($expose.mongodb | default true) }}
  - name: mongodb
    port: {{ $ports.mongodb | default 27017 }}
    targetPort: {{ $ports.mongodb | default 27017 }}
    protocol: TCP
  {{- end }}
  {{- if and .Values.redis.enabled ($expose.redis | default true) }}
  - name: redis
    port: {{ $ports.redis | default 6379 }}
    targetPort: {{ $ports.redis | default 6379 }}
    protocol: TCP
  {{- end }}
  {{- if and .Values.cassandra.enabled ($expose.cassandra | default true) }}
  - name: cassandra
    port: {{ $ports.cassandra | default 9042 }}
    targetPort: {{ $ports.cassandra | default 9042 }}
    protocol: TCP
  {{- end }}
{{- end }}
{{- end }}
