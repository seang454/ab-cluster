# FIX: Removed hook-delete-policy: hook-succeeded from SA/Role/RoleBinding
# If these are deleted before the wait-jobs complete, the jobs fail with
# "serviceaccount not found" or permission errors.
# They are safe to leave — they only have read access to deployments/pods.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-operator-waiter
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-operator-waiter
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-operator-waiter
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-operator-waiter
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-operator-waiter
  namespace: {{ .Release.Namespace }}
