{{- if .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.clusterIssuer.name }}
  namespace: cert-manager
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
spec:
  acme:
    server: {{ .Values.certManager.clusterIssuer.server }}
    email: {{ .Values.certManager.email }}
    privateKeySecretRef:
      name: {{ .Values.certManager.clusterIssuer.name }}
    solvers:
    - http01:
        ingress:
          class: {{ .Values.certManager.clusterIssuer.ingressClass }}
{{- end }}
---
{{- if and .Values.longhorn.enabled .Values.longhorn.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longhorn-ingress
  namespace: {{ .Values.longhorn.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.longhorn.ingress.tls.clusterIssuer }}
    {{- with .Values.longhorn.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.longhorn.ingress.ingressClassName | default .Values.ingress.className }}
  tls:
  - hosts:
    - {{ .Values.longhorn.ingress.host }}
    secretName: {{ .Values.longhorn.ingress.tls.secretName }}
  rules:
  - host: {{ .Values.longhorn.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: longhorn-frontend
            port:
              number: 80
{{- end }}
---
{{- if and .Values.vault.enabled .Values.vault.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-ingress
  namespace: {{ .Values.vault.ingress.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.vault.ingress.tls.clusterIssuer }}
    {{- with .Values.vault.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.vault.ingress.ingressClassName | default .Values.ingress.className }}
  tls:
  - hosts:
    - {{ .Values.vault.ingress.host }}
    secretName: {{ .Values.vault.ingress.tls.secretName }}
  rules:
  - host: {{ .Values.vault.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vault
            port:
              number: 8200
{{- end }}
