{{- if and .Values.issuer.enabled (not (lookup "cert-manager.io/v1" "ClusterIssuer" "" .Values.issuer.name)) }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.issuer.name }}
spec:
  acme:
    server: {{ .Values.issuer.server }}
    email: {{ .Values.issuer.email }}
    privateKeySecretRef:
      name: {{ .Values.issuer.name }}
    solvers:
      - http01:
          ingress:
            class: {{ .Values.issuer.ingressClass }}
{{- end }}
