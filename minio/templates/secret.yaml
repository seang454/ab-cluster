{{- /*
Create this Secret only in standalone mode.
When auth.existingSecret is set, the chart expects that Secret to be created
externally, for example by External Secrets Operator from Vault.
*/ -}}
{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "minio.secretName" . }}
  labels:
    {{- include "minio.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.rootUserKey }}: {{ .Values.auth.rootUser | quote }}
  {{ .Values.auth.rootPasswordKey }}: {{ .Values.auth.rootPassword | quote }}
{{- end }}
